<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - QuizPTIT</title>
</head>
<body>
<h1>Register</h1>
<div th:if="${errorMessage}">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/auth/register}" th:object="${registerForm}" method="post">
    <div>
        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" />
        <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
    </div>
    
    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" />
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>
    
    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" />
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>
    
    <div>
        <label>Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" />
        <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
    </div>
    
    <button type="submit">Register</button>
</form>

<div style="margin-top: 16px;">
    <a th:href="@{/auth/login}">Back to Login</a>
</div>
</body>
</html>
