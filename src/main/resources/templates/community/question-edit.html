<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Chỉnh sửa bài viết', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="mb-4">
                        <h3 class="fw-bold mb-1">Chỉnh sửa bài viết</h3>
                        <p class="text-muted mb-0">
                            Cập nhật nội dung bài viết của bạn trước khi tiếp tục thảo luận.
                        </p>
                    </div>
                    
                    <form th:action="@{/community/questions/{id}/edit(id=${postId})}"
                          th:object="${postRequest}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Nội dung</label>
                            <textarea th:field="*{content}" class="form-control" rows="10" required></textarea>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-warning px-4 fw-semibold">
                                <i class="bi bi-pencil-square me-1"></i> Cập nhật bài viết
                            </button>
                            
                            <a th:href="@{/community/questions/{id}(id=${postId})}"
                               class="btn btn-outline-secondary px-4">
                                Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
