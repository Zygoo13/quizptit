<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bình luận - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">💬 Danh sách bình luận hệ thống</h2>
    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-info">
        <tr>
            <th>ID Comment</th>
            <th>ID Bài viết</th>
            <th>Ngày tạo</th>
            <th>Trạng thái hiện tại</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${comments}">
            <td th:text="${c.commentId}"></td>
            <td th:text="${c.postId}"></td>
            <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
                <span th:if="${c.status == 'VISIBLE'}" class="text-success">Bình luận hiện đang hoạt động</span>
                <span th:if="${c.status == 'HIDDEN'}" class="text-warning">Bình luận hiện đang bị ẩn</span>
                <span th:if="${c.status == 'DELETED'}" class="text-danger">Bình luận hiện đang bị xóa</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
