<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bình luận - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-card {
            background: var(--glass-bg);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 30px;
            margin-bottom: 50px;
        }

        .table thead {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .table th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: none;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(56, 239, 125, 0.05);
            transition: all 0.3s ease;
            transform: scale(1.005);
        }

        .badge-status {
            padding: 8px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .page-title {
            color: #2c3e50;
            font-weight: 800;
            position: relative;
            display: inline-block;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60%;
            height: 4px;
            background: #38ef7d;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="main-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title">
                <i class="fas fa-comments text-success me-2"></i>Quản lý Bình luận
            </h2>
            <span class="badge bg-dark rounded-pill" th:text="${#lists.size(comments)} + ' bình luận'"></span>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th class="text-center">ID</th>
                    <th>Bài viết</th>
                    <th>Người bình luận</th> <th>Ngày tạo</th>
                    <th class="text-center">Trạng thái</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${comments}">
                    <td class="text-center fw-bold text-muted" th:text="'#' + ${c.commentId}"></td>
                    <td>
                        <span class="badge bg-light text-dark border">
                            <i class="fas fa-file-alt me-1 text-primary"></i>
                            <span th:text="${c.postId}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">
                                <i class="fas fa-user-circle fa-lg"></i>
                            </div>
                            <div>
                                <div class="fw-bold" th:text="${c.userFullName}"></div>
                                <small class="text-muted" th:text="${c.email}"></small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div>
                            <i class="far fa-calendar-alt me-1 text-muted"></i>
                            <span th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                        <small class="text-muted">
                            <i class="far fa-clock me-1"></i>
                            <span th:text="${#temporals.format(c.createdAt, 'HH:mm')}"></span>
                        </small>
                    </td>
                    <td class="text-center">
                        <span th:if="${c.status == 'VISIBLE'}" class="badge badge-status bg-success-subtle text-success border border-success">
                            <i class="fas fa-check-circle me-1"></i> Đang hoạt động
                        </span>
                        <span th:if="${c.status == 'HIDDEN'}" class="badge badge-status bg-warning-subtle text-warning border border-warning">
                            <i class="fas fa-eye-slash me-1"></i> Đang bị ẩn
                        </span>
                        <span th:if="${c.status == 'DELETED'}" class="badge badge-status bg-danger-subtle text-danger border border-danger">
                            <i class="fas fa-trash-alt me-1"></i> Đã bị xóa
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
