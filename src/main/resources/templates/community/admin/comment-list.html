<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Quản lý bình luận cộng đồng', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý bình luận</h3>
            <p class="text-muted mb-0">Theo dõi toàn bộ bình luận và xử lý nội dung khi cần.</p>
        </div>
        
        <span class="badge bg-light text-dark border"
              th:text="${#lists.size(comments)} + ' bình luận'">
            0 bình luận
        </span>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Bài viết</th>
                        <th>Người bình luận</th>
                        <th>Nội dung</th>
                        <th>Ngày tạo</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(comments)}">
                        <td colspan="7" class="text-center py-5 text-muted">Chưa có bình luận nào.</td>
                    </tr>
                    
                    <tr th:each="c : ${comments}">
                        <td class="ps-4 fw-bold text-primary" th:text="${c.commentId}">1</td>
                        
                        <td>
                            <a th:href="@{/community/questions/{id}(id=${c.postId})}"
                               target="_blank"
                               class="text-decoration-none">
                                Bài viết #<span th:text="${c.postId}">1</span>
                            </a>
                        </td>
                        
                        <td>
                            <div class="fw-semibold" th:text="${c.userFullName}">User</div>
                            <div class="small text-muted" th:text="${c.email}">email</div>
                        </td>
                        
                        <td style="max-width: 280px;">
                            <div class="text-truncate" th:text="${c.content}" th:title="${c.content}">
                                Nội dung bình luận
                            </div>
                        </td>
                        
                        <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}">12/04/2026 10:00</td>
                        
                        <td>
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${c.status == 'VISIBLE'} ? 'bg-success-subtle text-success border border-success-subtle' :
                                               (${c.status == 'HIDDEN'} ? 'bg-warning-subtle text-warning border border-warning-subtle' :
                                               'bg-danger-subtle text-danger border border-danger-subtle')"
                              th:text="${c.status}">
                            VISIBLE
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <div class="d-inline-flex gap-2 flex-wrap justify-content-end">
                                <a th:href="@{/community/questions/{id}(id=${c.postId})} + '#comment-' + ${c.commentId}"
                                   target="_blank"
                                   class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                    Xem
                                </a>
                                
                                <form th:action="@{/admin/community/comments/{id}/hide(id=${c.commentId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="reason" value="Admin ẩn bình luận">
                                    <button type="submit" class="btn btn-outline-warning btn-sm rounded-pill px-3">
                                        Ẩn
                                    </button>
                                </form>
                                
                                <form th:action="@{/admin/community/comments/{id}/delete(id=${c.commentId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="reason" value="Admin xóa bình luận">
                                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                                        Xóa
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
