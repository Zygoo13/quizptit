<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Quản lý bài viết cộng đồng', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý bài viết cộng đồng</h3>
            <p class="text-muted mb-0">Danh sách toàn bộ bài viết để quản trị viên theo dõi và xử lý.</p>
        </div>
        
        <span class="badge bg-light text-dark border"
              th:text="${#lists.size(questions)} + ' bài viết'">
            0 bài viết
        </span>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Chủ đề</th>
                        <th>Tác giả</th>
                        <th>Ngày đăng</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(questions)}">
                        <td colspan="6" class="text-center py-5 text-muted">Chưa có bài viết nào.</td>
                    </tr>
                    
                    <tr th:each="q : ${questions}">
                        <td class="ps-4 fw-bold text-primary" th:text="${q.questionPostId}">1</td>
                        
                        <td>
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2"
                              th:text="${q.topicName}">
                            Topic
                        </span>
                        </td>
                        
                        <td>
                            <div class="fw-semibold" th:text="${q.fullName}">User</div>
                            <div class="small text-muted" th:text="${q.email}">email</div>
                        </td>
                        
                        <td th:text="${#temporals.format(q.createdAt, 'dd/MM/yyyy HH:mm')}">12/04/2026 10:00</td>
                        
                        <td>
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${q.status == 'VISIBLE'} ? 'bg-success-subtle text-success border border-success-subtle' :
                                               (${q.status == 'HIDDEN'} ? 'bg-warning-subtle text-warning border border-warning-subtle' :
                                               'bg-danger-subtle text-danger border border-danger-subtle')"
                              th:text="${q.status}">
                            VISIBLE
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <div class="d-inline-flex gap-2 flex-wrap justify-content-end">
                                <a th:href="@{/community/questions/{id}(id=${q.questionPostId})}"
                                   class="btn btn-outline-primary btn-sm rounded-pill px-3"
                                   target="_blank">
                                    <i class="bi bi-eye me-1"></i> Xem
                                </a>
                                
                                <form th:action="@{/admin/community/questions/{id}/hide(id=${q.questionPostId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="reason" value="Admin ẩn bài viết">
                                    <button type="submit" class="btn btn-outline-warning btn-sm rounded-pill px-3">
                                        Ẩn
                                    </button>
                                </form>
                                
                                <form th:action="@{/admin/community/questions/{id}/delete(id=${q.questionPostId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="reason" value="Admin xóa bài viết">
                                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                                        Xóa
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
