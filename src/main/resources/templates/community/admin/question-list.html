<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bài viết - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">📋 Danh sách tất cả bài viết</h2>
    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Chủ đề</th>
            <th>Chủ bài viết</th>
            <th>Ngày tạo</th>
            <th>Trạng thái hiện tại</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="q : ${questions}">
            <td th:text="${q.questionPostId}"></td>
            <td th:text="${q.topicName}"></td>
            <td th:text="${q.fullName}"></td>
            <td>
                <div th:text="${#temporals.format(q.createdAt, 'dd/MM/yyyy')}"></div>
                <small class="text-muted" th:text="${#temporals.format(q.createdAt, 'HH:mm')}"></small>
            </td>
            <td>
                <span th:if="${q.status == 'VISIBLE'}" class="text-success fw-bold">Bài viết này đang hoạt động</span>
                <span th:if="${q.status == 'HIDDEN'}" class="text-warning fw-bold">Bài viết này đang bị ẩn</span>
                <span th:if="${q.status == 'DELETED'}" class="text-danger fw-bold">Bài viết này đã bị xóa</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
