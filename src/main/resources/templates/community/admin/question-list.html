<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bài viết - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .dashboard-card {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-top: 3rem;
        }

        .page-header {
            border-left: 5px solid #0d6efd;
            padding-left: 15px;
            margin-bottom: 2rem;
        }

        .table thead {
            background-color: #f8f9fa;
        }

        .table th {
            color: #495057;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 1.25rem 1rem;
            border-bottom: 2px solid #dee2e6;
        }

        .table tbody tr {
            transition: all 0.2s ease;
        }

        .table tbody tr:hover {
            background-color: #f1f7ff;
            transform: translateY(-1px);
        }

        .topic-badge {
            background-color: #e7f1ff;
            color: #0d6efd;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pill {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-visible { background: #d1e7dd; color: #0f5132; }
        .status-hidden { background: #fff3cd; color: #664d03; }
        .status-deleted { background: #f8d7da; color: #842029; }

        .time-box {
            line-height: 1.2;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-card">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1 fw-bold">📋 Quản lý Bài viết</h2>
                <p class="text-muted mb-0">Theo dõi và điều phối nội dung cộng đồng</p>
            </div>
            <div class="text-end">
                <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${#lists.size(questions)} + ' Bài viết'"></span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Chủ đề</th>
                    <th>Tác giả</th>
                    <th>Ngày đăng</th>
                    <th class="text-center">Trạng thái</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="q : ${questions}">
                    <td class="text-muted fw-bold" th:text="'#' + ${q.questionPostId}"></td>
                    <td>
                        <span class="topic-badge">
                            <i class="fas fa-hashtag me-1"></i>
                            <span th:text="${q.topicName}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-sm me-2">
                                <i class="fas fa-user-circle fa-2x text-secondary"></i>
                            </div>
                            <span class="fw-medium" th:text="${q.fullName}"></span>
                        </div>
                    </td>
                    <td>
                        <div class="time-box">
                            <div class="fw-bold text-dark" th:text="${#temporals.format(q.createdAt, 'dd/MM/yyyy')}"></div>
                            <small class="text-muted">
                                <i class="far fa-clock me-1"></i>
                                <span th:text="${#temporals.format(q.createdAt, 'HH:mm')}"></span>
                            </small>
                        </div>
                    </td>
                    <td class="text-center">
                        <span th:if="${q.status == 'VISIBLE'}" class="status-pill status-visible">
                            <i class="fas fa-check-circle"></i> Đang hoạt động
                        </span>
                        <span th:if="${q.status == 'HIDDEN'}" class="status-pill status-hidden">
                            <i class="fas fa-eye-slash"></i> Đang bị ẩn
                        </span>
                        <span th:if="${q.status == 'DELETED'}" class="status-pill status-deleted">
                            <i class="fas fa-trash-alt"></i> Đã bị xóa
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
