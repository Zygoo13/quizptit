<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Nhật ký kiểm duyệt', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Nhật ký kiểm duyệt</h3>
            <p class="text-muted mb-0">Lịch sử ẩn, xóa, khôi phục nội dung cộng đồng.</p>
        </div>
    </div>
    
    <ul class="nav nav-tabs mb-4 border-bottom">
        <li class="nav-item">
            <a class="nav-link border-0"
               th:classappend="${currentType == 'QUESTION_POST'} ? 'active fw-bold text-primary border-bottom border-3 border-primary' : ''"
               th:href="@{/admin/community/moderation-records(type='QUESTION_POST')}">
                Bài viết
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link border-0"
               th:classappend="${currentType == 'COMMENT'} ? 'active fw-bold text-primary border-bottom border-3 border-primary' : ''"
               th:href="@{/admin/community/moderation-records(type='COMMENT')}">
                Bình luận
            </a>
        </li>
    </ul>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Target ID</th>
                        <th>Nội dung</th>
                        <th>Lý do</th>
                        <th>Người xử lý</th>
                        <th>Thời gian</th>
                        <th class="text-center">Xem</th>
                        <th class="text-end pe-4">Khôi phục</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td colspan="7" class="text-center py-5 text-muted">Chưa có bản ghi kiểm duyệt nào.</td>
                    </tr>
                    
                    <tr th:each="r : ${records}">
                        <td class="ps-4 fw-bold text-primary"
                            th:text="${currentType == 'COMMENT' ? r.commentId : r.postId}">
                            1
                        </td>
                        
                        <td style="max-width: 260px;">
                            <div class="text-truncate" th:text="${r.content}" th:title="${r.content}">
                                Content
                            </div>
                        </td>
                        
                        <td th:text="${r.reason}">Reason</td>
                        
                        <td th:text="${r.moderatorName}">Admin</td>
                        
                        <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}">12/04/2026 10:00</td>
                        
                        <td class="text-center">
                            <a th:href="@{/community/questions/{pId}(pId=${r.postId})} + ${(currentType == 'COMMENT' and r.commentId != null) ? '#comment-' + r.commentId : ''}"
                               target="_blank"
                               class="btn btn-outline-info btn-sm rounded-pill px-3">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                        
                        <td class="text-end pe-4">
                            <div th:if="${r.action == 'RESTORE'}">
                            <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                                Đã khôi phục
                            </span>
                            </div>
                            
                            <div th:unless="${r.action == 'RESTORE'}">
                                <form th:action="@{/admin/community/{type}/{id}/restore(type=${currentType == 'QUESTION_POST' ? 'questions' : 'comments'}, id=${currentType == 'QUESTION_POST' ? r.postId : r.commentId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" name="reason" value="Admin khôi phục nội dung">
                                    <button type="submit" class="btn btn-success btn-sm rounded-pill px-3">
                                        <i class="bi bi-arrow-counterclockwise me-1"></i> Khôi phục
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
