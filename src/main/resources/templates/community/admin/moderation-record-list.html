<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhật ký kiểm duyệt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .nav-link.active { border-bottom: 3px solid #0d6efd !important; color: #0d6efd !important; }
        .table { border-radius: 8px; overflow: hidden; }

        /* Hiệu ứng cắt bớt chữ nếu quá dài */
        .content-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tooltip đơn giản khi rê chuột vào nội dung */
        .content-cell:hover {
            white-space: normal;
            overflow: visible;
            word-break: break-all;
            background: #f8f9fa;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">🛡️ Nhật ký xử lý vi phạm</h2>

    <ul class="nav nav-tabs mb-4 border-bottom-0">
        <li class="nav-item">
            <a class="nav-link border-0" th:classappend="${currentType == 'QUESTION_POST' ? 'active fw-bold' : ''}"
               th:href="@{/admin/community/moderation-records?type=QUESTION_POST}">Bài viết</a>
        </li>
        <li class="nav-item">
            <a class="nav-link border-0" th:classappend="${currentType == 'COMMENT' ? 'active fw-bold' : ''}"
               th:href="@{/admin/community/moderation-records?type=COMMENT}">Bình luận</a>
        </li>
    </ul>

    <div class="table-responsive">
        <table class="table table-striped align-middle bg-white shadow-sm border">
            <thead class="table-dark">
            <tr>
                <th style="width: 10%">ID</th>
                <th style="width: 30%">Nội dung gốc</th> <th style="width: 30%">Lý do xử lý</th>
                <th class="text-center" style="width: 10%">Xem</th>
                <th class="text-center" style="width: 20%">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${records}" th:if="${r != null}">
                <td class="fw-bold text-primary">
                    <span th:text="${currentType == 'COMMENT' ? '#' + r.commentId : '#' + r.postId}"></span>
                </td>

                <td>
                    <div class="content-cell" th:text="${r.content}" th:title="${r.content}">
                        Nội dung đang tải...
                    </div>
                </td>

                <td th:text="${r.reason}"></td>

                <td class="text-center">
                    <a th:if="${currentType == 'COMMENT'}"
                       th:href="@{/community/questions/{pId}(pId=${r.postId})} + '#comment-' + ${r.commentId}"
                       target="_blank" class="btn btn-outline-info btn-sm">
                        <i class="fas fa-eye"></i>
                    </a>

                    <a th:if="${currentType == 'QUESTION_POST'}"
                       th:href="@{/community/questions/{id}(id=${r.postId})}"
                       target="_blank" class="btn btn-outline-info btn-sm">
                        <i class="fas fa-eye"></i>
                    </a>
                </td>
                <td class="text-center">
                    <form th:id="'restoreForm-' + ${r.moderationId}"
                          th:action="@{/admin/community/{type}/{id}/restore(type=${currentType == 'QUESTION_POST' ? 'questions' : 'comments'}, id=${currentType == 'QUESTION_POST' ? r.postId : r.commentId})}"
                          method="post">
                        <input type="hidden" name="reason" value="Admin khôi phục nội dung">
                        <button type="button" class="btn btn-success btn-sm rounded-pill px-3 shadow-sm"
                                th:onclick="'handleConfirm(' + ${r.moderationId} + ')'">
                            <i class="fas fa-undo-alt me-1"></i> Khôi phục
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(records)}" class="text-center p-5 bg-white border rounded shadow-sm">
        <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
        <p class="text-muted fs-5">Chưa có nhật ký xử lý nào cho mục này.</p>
    </div>
</div>

<script>
    function handleConfirm(moderationId) {
        Swal.fire({
            title: 'Xác nhận khôi phục?',
            text: "Nội dung này sẽ hiển thị lại công khai trên hệ thống!",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#198754',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Đồng ý, khôi phục',
            cancelButtonText: 'Hủy bỏ',
            reverseButtons: true
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('restoreForm-' + moderationId).submit();
            }
        });
    }
</script>

</body>
</html>
