<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/student-layout :: layout(${post.title}, ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .avatar-circle { width: 42px; height: 42px; background-color: #0d6efd; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 0.9rem; flex-shrink: 0; }
        .avatar-circle-sm { width: 32px; height: 32px; font-size: 0.8rem; }
        .post-content { line-height: 1.8; font-size: 1.05rem; white-space: pre-line; color: #333; }
        .comment-bubble, .reply-bubble { position: relative; padding: 10px 15px; border-radius: 18px; background-color: #f0f2f5; max-width: 100%; word-wrap: break-word; }
        .reply-box { margin-left: 20px; }
        .btn-reply { font-size: 0.85rem; color: #65676b; text-decoration: none; font-weight: 600; cursor: pointer; }
        .btn-reply:hover { text-decoration: underline; color: #0d6efd; }
        .comment-hidden { background-color: #f8f9fa !important; border: 1px dashed #dee2e6 !important; opacity: 0.85; }
        .comment-hidden p { color: #6c757d !important; font-style: italic; }
        .comment-wrapper { position: relative; }
        .comment-actions-trigger { position: absolute; right: -34px; top: 50%; transform: translateY(-50%); opacity: 0; transition: all 0.2s ease; color: #65676b; cursor: pointer; padding: 5px; z-index: 5; }
        .comment-wrapper:hover .comment-actions-trigger { opacity: 1; }
    </style>

    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-2">
                        <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2" th:text="${post.topicName}">Topic</span>
                        <div class="dropdown" sec:authorize="isAuthenticated()" th:if="${post.email == #authentication.name or #authorization.expression('hasRole(''ADMIN'')')}">
                            <button class="btn btn-light rounded-pill px-3" data-bs-toggle="dropdown" type="button"><i class="bi bi-three-dots"></i></button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <th:block th:if="${post.email == #authentication.name}">
                                    <li><a class="dropdown-item" th:href="@{/community/questions/{id}/edit(id=${post.questionPostId})}"><i class="bi bi-pencil-square me-2"></i>Sửa bài</a></li>
                                    <li><button type="button" class="dropdown-item text-danger" th:onclick="|confirmDeletePost(${post.questionPostId})|"><i class="bi bi-trash me-2"></i>Xóa bài</button></li>
                                </th:block>
                                <th:block sec:authorize="hasRole('ADMIN')">
                                    <li th:if="${post.email == #authentication.name}"><hr class="dropdown-divider"></li>
                                    <li><button type="button" class="dropdown-item text-warning" th:onclick="|openAdminPostActionDetail(${post.questionPostId}, 'hide')|"><i class="bi bi-eye-slash me-2"></i>Ẩn bài (Admin)</button></li>
                                    <li><button type="button" class="dropdown-item text-danger fw-bold" th:onclick="|openAdminPostActionDetail(${post.questionPostId}, 'delete')|"><i class="bi bi-shield-x me-2"></i>Xóa bài (Admin)</button></li>
                                </th:block>
                            </ul>
                        </div>
                    </div>
                    <h1 class="fw-bold mb-3" th:text="${post.title}">Tiêu đề</h1>
                    <div class="post-content mb-4" th:text="${post.content}">Nội dung</div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Bình luận (<span th:text="${post.commentCount}">0</span>)</h5>

                    <div class="mb-5" sec:authorize="isAuthenticated()">
                        <form th:action="@{/community/questions/{id}/comments/create(id=${post.questionPostId})}" method="post" id="commentForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="parentId" id="parentIdInput">
                            <textarea name="content" id="commentContent" class="form-control rounded-3" rows="3" placeholder="Viết bình luận..." required></textarea>
                            <div class="text-end mt-2">
                                <button type="button" onclick="cancelReply()" class="btn btn-outline-secondary btn-sm rounded-pill px-3 me-2">Hủy</button>
                                <button type="submit" id="submitBtn" class="btn btn-primary rounded-pill px-4">Gửi</button>
                            </div>
                        </form>
                    </div>

                    <div id="commentList">
                        <div th:each="comment : ${comments}" th:id="'comment-' + ${comment.commentId}" class="mb-4 comment-item p-3">
                            <div class="d-flex gap-2">
                                <div class="avatar-circle avatar-circle-sm" th:text="${comment.userFullName != null ? #strings.substring(comment.userFullName,0,1) : 'U'}">U</div>
                                <div class="flex-grow-1">
                                    <div class="comment-wrapper d-inline-block">
                                        <div class="comment-bubble shadow-sm" th:classappend="${comment.status != 'VISIBLE'} ? 'comment-hidden' : ''">
                                            <div class="fw-bold mb-0" style="font-size:0.85rem;" th:text="${comment.userFullName}">User</div>
                                            <p class="mb-0 text-dark" th:text="${comment.content}">Content</p>
                                        </div>
                                        <div class="dropdown comment-actions-trigger" sec:authorize="isAuthenticated()">
                                            <i class="bi bi-three-dots" data-bs-toggle="dropdown"></i>
                                            <ul class="dropdown-menu shadow border-0">
                                                <th:block th:if="${comment.email == #authentication.name}">
                                                    <li><a class="dropdown-item edit-comment-btn" href="javascript:void(0)" th:data-id="${comment.commentId}" th:data-content="${comment.content}"><i class="bi bi-pencil-square me-2"></i>Sửa</a></li>
                                                    <li><a class="dropdown-item text-danger" href="javascript:void(0)" th:onclick="|confirmDeleteComment(${comment.commentId})|"><i class="bi bi-trash me-2"></i>Xóa</a></li>
                                                </th:block>
                                                <th:block sec:authorize="hasRole('ADMIN')">
                                                    <li th:if="${comment.email == #authentication.name}"><hr class="dropdown-divider"></li>
                                                    <li><button type="button" class="dropdown-item text-warning" th:onclick="|openAdminCommentAction(${comment.commentId}, 'hide')|"><i class="bi bi-eye-slash me-2"></i>Ẩn (Admin)</button></li>
                                                    <li><button type="button" class="dropdown-item text-danger fw-bold" th:onclick="|openAdminCommentAction(${comment.commentId}, 'delete')|"><i class="bi bi-shield-x me-2"></i>Xóa (Admin)</button></li>
                                                </th:block>
                                            </ul>
                                        </div>
                                    </div>
                                    <div class="ms-2 mt-1">
                                        <small class="text-muted me-3" th:text="${#temporals.format(comment.createdAt, 'dd/MM HH:mm')}">Time</small>
                                        <span th:if="${comment.status == 'VISIBLE'}" class="btn-reply" th:data-id="${comment.commentId}" th:data-name="${comment.userFullName}" onclick="handleReplyClick(this, null)">Phản hồi</span>
                                    </div>

                                    <div class="reply-box mt-3" th:if="${!#lists.isEmpty(comment.replies)}">
                                        <div th:each="reply : ${comment.replies}" th:id="'comment-' + ${reply.commentId}" class="mb-2 p-2">
                                            <div class="d-flex gap-2 align-items-start">
                                                <div class="avatar-circle avatar-circle-sm" th:text="${reply.userFullName != null ? #strings.substring(reply.userFullName,0,1) : 'U'}">U</div>
                                                <div class="flex-grow-1">
                                                    <div class="comment-wrapper d-inline-block">
                                                        <div class="reply-bubble border shadow-sm" th:classappend="${reply.status != 'VISIBLE'} ? 'comment-hidden' : ''">
                                                            <div class="fw-bold mb-0" style="font-size:0.8rem;" th:text="${reply.userFullName}">User</div>
                                                            <p class="mb-0 small text-dark" th:text="${reply.content}">Content</p>
                                                        </div>
                                                        <div class="dropdown comment-actions-trigger" sec:authorize="isAuthenticated()">
                                                            <i class="bi bi-three-dots" style="font-size:0.8rem;" data-bs-toggle="dropdown"></i>
                                                            <ul class="dropdown-menu shadow border-0">
                                                                <th:block th:if="${reply.email == #authentication.name}">
                                                                    <li><a class="dropdown-item edit-comment-btn" href="javascript:void(0)" th:data-id="${reply.commentId}" th:data-content="${reply.content}"><i class="bi bi-pencil-square me-2"></i>Sửa</a></li>
                                                                    <li><a class="dropdown-item text-danger" href="javascript:void(0)" th:onclick="|confirmDeleteComment(${reply.commentId})|"><i class="bi bi-trash me-2"></i>Xóa</a></li>
                                                                </th:block>
                                                                <th:block sec:authorize="hasRole('ADMIN')">
                                                                    <li th:if="${reply.email == #authentication.name}"><hr class="dropdown-divider"></li>
                                                                    <li><button type="button" class="dropdown-item text-warning" th:onclick="|openAdminCommentAction(${reply.commentId}, 'hide')|"><i class="bi bi-eye-slash me-2"></i>Ẩn (Admin)</button></li>
                                                                    <li><button type="button" class="dropdown-item text-danger fw-bold" th:onclick="|openAdminCommentAction(${reply.commentId}, 'delete')|"><i class="bi bi-shield-x me-2"></i>Xóa (Admin)</button></li>
                                                                </th:block>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                    <div class="ms-2">
                                                        <small class="text-muted me-2" style="font-size:0.7rem;" th:text="${#temporals.format(reply.createdAt, 'dd/MM HH:mm')}">Time</small>
                                                        <span th:if="${reply.status == 'VISIBLE'}" class="btn-reply" th:data-id="${reply.commentId}" th:data-name="${reply.userFullName}" th:onclick="|handleReplyClick(this, ${comment.commentId})|">Phản hồi</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminActionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 15px;">
                <form id="adminActionForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold" id="adminModalTitle">Lý do xử lý</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body"><textarea name="reason" class="form-control" rows="3" required></textarea></div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn rounded-pill px-4 text-white" id="adminSubmitBtn">Xác nhận</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow" style="border-radius: 15px;">
                <div class="modal-body p-4 text-center">
                    <h5 class="fw-bold mb-3" id="deleteModalTitle">Xác nhận xóa?</h5>
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <button type="button" class="btn btn-light rounded-pill px-3" data-bs-dismiss="modal">Hủy</button>
                        <form id="deleteFormAction" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger rounded-pill px-3">Xác nhận</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const commentForm = document.getElementById('commentForm');
        const textarea = document.getElementById('commentContent');
        const parentInput = document.getElementById('parentIdInput');
        const submitBtn = document.getElementById('submitBtn');
        const originalAction = commentForm ? commentForm.action : '';

        function handleReplyClick(el, rootId) {
            if (!commentForm) return;
            const commentId = el.getAttribute('data-id');
            const name = el.getAttribute('data-name');
            commentForm.action = originalAction;
            submitBtn.innerText = 'Gửi phản hồi';
            parentInput.value = rootId ? rootId : commentId;
            textarea.value = '@' + name + ' ';
            window.scrollTo({ top: commentForm.offsetTop - 150, behavior: 'smooth' });
            textarea.focus();
        }

        document.addEventListener('click', function (e) {
            const editBtn = e.target.closest('.edit-comment-btn');
            if (editBtn) {
                textarea.value = editBtn.getAttribute('data-content');
                commentForm.action = '/community/comments/update/' + editBtn.getAttribute('data-id');
                submitBtn.innerText = 'Cập nhật';
                window.scrollTo({ top: commentForm.offsetTop - 150, behavior: 'smooth' });
                textarea.focus();
            }
        });

        function setupAdminModal(url, type, targetName) {
            const adminForm = document.getElementById('adminActionForm');
            const title = document.getElementById('adminModalTitle');
            const btn = document.getElementById('adminSubmitBtn');
            adminForm.action = url;
            if (type === 'hide') {
                title.innerText = `Lý do ẩn ${targetName}`;
                btn.innerText = 'Xác nhận ẩn';
                btn.className = 'btn btn-warning rounded-pill px-4 text-dark';
            } else {
                title.innerText = `Lý do xóa ${targetName}`;
                btn.innerText = 'Xác nhận xóa';
                btn.className = 'btn btn-danger rounded-pill px-4 text-white';
            }
            new bootstrap.Modal(document.getElementById('adminActionModal')).show();
        }

        function openAdminPostActionDetail(id, actionType) { setupAdminModal(`/admin/community/questions/${id}/${actionType}`, actionType, 'bài viết'); }
        function openAdminCommentAction(id, actionType) { setupAdminModal(`/admin/community/comments/${id}/${actionType}`, actionType, 'bình luận'); }
        function confirmDeletePost(id) {
            const deleteForm = document.getElementById('deleteFormAction');
            deleteForm.action = '/community/questions/' + id + '/delete';
            document.getElementById('deleteModalTitle').innerText = 'Xóa bài viết này?';
            new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
        }
        function confirmDeleteComment(id) {
            const deleteForm = document.getElementById('deleteFormAction');
            deleteForm.action = '/community/comments/' + id + '/delete';
            document.getElementById('deleteModalTitle').innerText = 'Xóa bình luận này?';
            new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
        }
        function cancelReply() { parentInput.value = ''; commentForm.action = originalAction; submitBtn.innerText = 'Gửi'; textarea.value = ''; }
    </script>
</div>
</body>
</html>
