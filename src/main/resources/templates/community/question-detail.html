<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"> <head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">Chi tiết câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-content { line-height: 1.8; font-size: 1.1rem; white-space: pre-line; }
        .meta-info { font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/community/questions}" class="btn btn-outline-secondary btn-sm">
            &larr; Quay lại danh sách
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="display-6 fw-bold text-primary mb-3" th:text="${post.title}">Tiêu đề bài viết</h1>

                    <div class="meta-info d-flex align-items-center mb-4 pb-3 border-bottom">
                            <span class="me-3">
                                <strong>Người đăng:</strong> <span th:text="${post.fullName}">Admin</span>
                            </span>
                        <span class="me-3">
                                <strong>Ngày:</strong> <span th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                            </span>
                        <span>
                                <strong>Lượt xem:</strong> <span th:text="${post.viewCount}">0</span>
                            </span>
                    </div>

                    <div class="post-content mb-5" th:text="${post.content}">
                        Nội dung chi tiết sẽ hiển thị ở đây...
                    </div>

                    <div class="d-flex gap-2">
                        <a th:if="${post.email == #authentication.name}"
                           th:href="@{/community/questions/{id}/edit(id=${post.questionPostId})}"
                           class="btn btn-warning">Chỉnh sửa</a>

                        <form th:if="${post.email == #authentication.name}"
                              th:action="@{/community/questions/{id}/delete(id=${post.questionPostId})}"
                              method="post"
                              onsubmit="return confirm('Bạn có chắc chắn muốn xóa bài này?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger">Xóa bài</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
