<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt câu hỏi mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS để làm các ô chọn màu hình tròn nhìn chuyên nghiệp hơn */
        .color-selector input[type="radio"] {
            display: none;
        }
        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: inline-block;
        }
        .color-selector input[type="radio"]:checked + .color-option {
            border-color: #0d6efd;
            transform: scale(1.2);
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-header bg-primary text-white p-3" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0">Đặt câu hỏi cho cộng đồng</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/community/questions/create}" th:object="${postRequest}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề</label>
                            <input type="text" th:field="*{title}" class="form-control" placeholder="Tóm tắt câu hỏi của bạn..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chủ đề bài viết</label>
                            <select th:field="*{topicId}" class="form-select" required>
                                <option value="">-- Chọn chủ đề --</option>
                                <option th:each="t : ${topics}"
                                        th:value="${t.topicId}"
                                        th:text="${t.topicName}"></option>
                            </select>
                            <small class="text-muted">Chọn đúng chủ đề để nhận được hỗ trợ nhanh nhất.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Chọn màu nền bài viết</label>
                            <div class="color-selector d-flex gap-3 align-items-center">
                                <label>
                                    <input type="radio" th:field="*{themeColor}" value="#ffffff" checked>
                                    <span class="color-option" style="background-color: #ffffff; border: 1px solid #ddd;"></span>
                                </label>

                                <label>
                                    <input type="radio" th:field="*{themeColor}" value="#e7f3ff">
                                    <span class="color-option" style="background-color: #e7f3ff;"></span>
                                </label>

                                <label>
                                    <input type="radio" th:field="*{themeColor}" value="#f2f2f2">
                                    <span class="color-option" style="background-color: #f2f2f2;"></span>
                                </label>

                                <label>
                                    <input type="radio" th:field="*{themeColor}" value="#fff8e1">
                                    <span class="color-option" style="background-color: #fff8e1;"></span>
                                </label>

                                <label>
                                    <input type="radio" th:field="*{themeColor}" value="#ffeef8">
                                    <span class="color-option" style="background-color: #ffeef8;"></span>
                                </label>
                            </div>
                            <small class="text-muted">Màu này sẽ hiển thị làm nền cho bài viết của bạn trên trang chủ.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea th:field="*{content}" class="form-control" rows="8" placeholder="Mô tả chi tiết vấn đề bạn gặp phải..." required></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">🚀 Đăng bài</button>
                            <a th:href="@{/community/questions}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
