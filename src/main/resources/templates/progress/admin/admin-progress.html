<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Theo dõi tiến độ học tập', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .progress-percent-cell {
            min-width: 140px;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Theo dõi tiến độ học tập</h3>
            <p class="text-muted mb-0">
                Theo dõi tiến độ học của sinh viên theo từng môn học.
            </p>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form th:action="@{/admin/progress}" method="get" class="row g-3 align-items-end">
                <div class="col-lg-5">
                    <label class="form-label fw-semibold">Môn học</label>
                    <select name="subjectId" class="form-select">
                        <option value="">Tất cả môn học</option>
                        <option th:each="subject : ${subjects}"
                                th:value="${subject.subjectId}"
                                th:text="${subject.subjectName}"
                                th:selected="${selectedSubject == subject.subjectId}">
                            Subject
                        </option>
                    </select>
                </div>
                
                <div class="col-lg-5">
                    <label class="form-label fw-semibold">Từ khóa</label>
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           th:value="${keyword}"
                           placeholder="Tìm theo email hoặc họ tên">
                </div>
                
                <div class="col-lg-2 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel me-1"></i> Lọc
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Sinh viên</th>
                        <th>Môn học</th>
                        <th>Tiến độ</th>
                        <th>Chương hoàn thành</th>
                        <th>Điểm TB</th>
                        <th>Đánh giá</th>
                        <th class="text-end pe-4">Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${progressPage == null or #lists.isEmpty(progressPage.content)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            Không có dữ liệu tiến độ phù hợp.
                        </td>
                    </tr>
                    
                    <tr th:each="row : ${progressPage.content}">
                        <td class="ps-4">
                            <div class="fw-semibold" th:text="${row.fullName}">Sinh viên</div>
                            <div class="small text-muted" th:text="${row.email}">email@example.com</div>
                        </td>
                        
                        <td th:text="${row.subjectName}">Subject</td>
                        
                        <td class="progress-percent-cell">
                            <div class="small fw-semibold mb-1">
                                <span th:text="${row.progressPercentage}">0</span>%
                            </div>
                            <div class="progress" style="height: 10px; border-radius: 999px;">
                                <div class="progress-bar"
                                     role="progressbar"
                                     th:style="'width:' + ${row.progressPercentage} + '%;'">
                                </div>
                            </div>
                        </td>
                        
                        <td>
                            <span th:text="${row.completedTopics}">0</span> /
                            <span th:text="${row.totalTopics}">0</span>
                        </td>
                        
                        <td>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${row.averageScore}">
                            0
                        </span>
                        </td>
                        
                        <td>
                        <span th:if="${row.status == 'Xuất sắc'}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            Xuất sắc
                        </span>
                            <span th:if="${row.status == 'Đạt'}"
                                  class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2">
                            Đạt
                        </span>
                            <span th:if="${row.status == 'Cảnh báo'}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-3 py-2">
                            Cảnh báo
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <a th:href="@{/admin/progress/user/{userId}(userId=${row.userId}, subjectId=${row.subjectId})}"
                               class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                <i class="bi bi-eye me-1"></i> Xem
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="card-body pt-3" th:if="${progressPage != null and progressPage.totalPages > 1}">
            <div th:replace="~{fragments/pagination :: pagination(${progressPage})}"></div>
        </div>
    </div>
</div>
</body>
</html>
