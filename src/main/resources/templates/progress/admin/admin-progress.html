<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tiến độ - QuizPTIT Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .app-card { border: none; border-radius: 12px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .progress { border-radius: 10px; background-color: #e9ecef; }
        .table thead th { background-color: #f8f9fa; border-top: none; color: #6c757d; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .status-badge { padding: 0.5em 1em; border-radius: 50px; font-weight: 500; font-size: 0.85rem; }
        .table-fixed { table-layout: fixed; width: 100%; }
        .text-truncate-custom { 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 100%; 
            display: block;
        }
        .status-badge { 
            white-space: nowrap; 
            display: inline-block; 
            min-width: 100px; 
            text-align: center;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark">Quản lý Tiến độ Sinh viên</h2>
                <p class="text-muted mb-0">Theo dõi chi tiết quá trình học tập.</p>
            </div>
            <div class="text-end">
                <span class="badge bg-primary px-3 py-2" th:text="${progressPage.totalElements} + ' Bản ghi'">0 Bản ghi</span>
            </div>
        </div>

        <div class="card app-card mb-4">
            <div class="card-body p-4">
                <form th:action="@{/admin/progress}" method="get" class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label small fw-bold text-secondary">Tìm kiếm</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" class="form-control border-start-0" 
                                   placeholder="Nhập Email hoặc tên sinh viên..." th:value="${keyword}">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-secondary">Môn học</label>
                        <select name="subjectId" class="form-select">
                            <option value="">-- Tất cả môn học --</option>
                            <option th:each="s : ${subjects}" 
                                    th:value="${s.subjectId}" 
                                    th:text="${s.subjectName}"
                                    th:selected="${s.subjectId == selectedSubject}"></option>
                        </select>
                    </div>

                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-filter"></i> Lọc dữ liệu
                        </button>
                        <a th:href="@{/admin/progress}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card app-card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4" style="width: 70px;">ID</th>
                            <th style="width: 200px;">EMAIL</th>
                            <th style="width: 160px;">HỌ TÊN</th>
                            <th style="width: 180px;">MÔN HỌC</th>
                            <th style="width: 220px;">TIẾN ĐỘ CHƯƠNG</th>
                            <th style="width: 100px;" class="text-center">GPA</th>
                            <th style="width: 130px;" class="text-center">TRẠNG THÁI</th>
                            <th class="text-end pe-4" style="width: 120px;">THAO TÁC</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${progressPage.isEmpty()}">
                            <td colspan="8" class="text-center py-5">
                                <i class="bi bi-inbox fs-1 text-muted d-block mb-2"></i>
                                <p class="text-muted">Không tìm thấy dữ liệu tiến độ nào phù hợp.</p>
                            </td>
                        </tr>

                        <tr th:each="p : ${progressPage.content}">
                            <td class="ps-4 text-muted small">#[[${p.userId}]]</td>
                            <td>
                                <span class="fw-bold text-truncate-custom" th:text="${p.email}" th:title="${p.email}">student@email.com</span>
                            </td>
                            <td>
                                <span class="fw-semibold text-truncate-custom" th:text="${p.fullName}">Nguyễn Văn A</span>
                            </td>
                            <td th:text="${p.subjectName}">Tên môn học</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="progress flex-grow-1 me-2" style="height: 8px;">
                                        <div class="progress-bar" role="progressbar" 
                                            th:style="'width: ' + ${p.progressPercentage} + '%;'"
                                            th:classappend="${p.progressPercentage < 40} ? 'bg-danger' : (${p.progressPercentage < 75} ? 'bg-warning' : 'bg-success')"></div>
                                    </div>
                                    <small class="fw-bold text-secondary" style="min-width: 45px;" th:text="${p.completedTopics} + '/' + ${p.totalTopics}"></small>
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="fs-6 fw-bold" 
                                    th:classappend="${p.averageScore != null && p.averageScore.doubleValue() < 5.0} ? 'text-danger' : 'text-primary'"
                                    th:text="${p.averageScore != null ? #numbers.formatDecimal(p.averageScore, 1, 2) : '0.00'}">0.00</span>
                            </td>
                            <td class="text-center">
                                <span class="status-badge shadow-sm" 
                                    th:classappend="${p.status == 'Xuất sắc' ? 'bg-success text-white' : 
                                                    (p.status == 'Cảnh báo' ? 'bg-danger text-white' : 'bg-info text-dark')}"
                                    th:text="${p.status}">Đạt</span>
                            </td>
                            <td class="text-end pe-4">
                                <a th:href="@{/admin/progress/user/{id}(id=${p.userId})}" class="btn btn-sm btn-outline-primary rounded-pill">
                                    <i class="bi bi-search"></i> Xem
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${progressPage.totalPages > 1}">
                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${progressPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/progress(page=${progressPage.number - 1}, subjectId=${selectedSubject}, keyword=${keyword})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(0, progressPage.totalPages - 1)}"
                            th:classappend="${i == progressPage.number} ? 'active'">
                            <a class="page-link" th:text="${i + 1}" 
                               th:href="@{/admin/progress(page=${i}, subjectId=${selectedSubject}, keyword=${keyword})}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${progressPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/progress(page=${progressPage.number + 1}, subjectId=${selectedSubject}, keyword=${keyword})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
