<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tiến độ học tập - QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="mb-4">
            <h2 class="fw-bold">Lộ trình học tập của tôi</h2>
            <p class="text-muted">Theo dõi tiến độ hoàn thành các môn học tại PTIT</p>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="s : ${subjects}">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="card-title fw-bold text-primary" th:text="${s.subjectName}">Tên môn học</h5>
                            <span class="badge bg-primary-subtle text-primary" th:text="${s.totalTopics} + ' Chương'"></span>
                        </div>
                        
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="text-muted">Tiến độ tổng quát</small>
                                <small class="fw-bold" th:text="${s.overallPercentage} + '%'"></small>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-success" role="progressbar" 
                                     th:style="'width: ' + ${s.overallPercentage} + '%'"></div>
                            </div>
                        </div>

                        <p class="card-text small text-muted">
                            <i class="bi bi-check2-circle"></i> 
                            Đã hoàn thành <span th:text="${s.completedTopics}"></span>/<span th:text="${s.totalTopics}"></span> chương.
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <a th:href="@{/progress/subject/{id}(id=${s.subjectId})}" class="btn btn-outline-primary w-100">
                            Xem chi tiết chương <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
