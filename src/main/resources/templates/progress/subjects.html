<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Tiến độ học tập', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .progress-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .progress-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
        }

        .progress-ring-label {
            font-size: 1.5rem;
            font-weight: 800;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Tiến độ học tập</h3>
            <p class="text-muted mb-0">
                Theo dõi mức độ hoàn thành của bạn theo từng môn học.
            </p>
        </div>
        
        <a th:href="@{/review/suggestions}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-lightbulb me-1"></i> Gợi ý ôn tập
        </a>
    </div>
    
    <div th:if="${#lists.isEmpty(subjects)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="display-6 text-muted mb-3">
                <i class="bi bi-bar-chart-line"></i>
            </div>
            <h5 class="fw-bold mb-2">Chưa có dữ liệu tiến độ</h5>
            <p class="text-muted mb-0">Hãy bắt đầu làm quiz để hệ thống ghi nhận tiến độ học tập.</p>
        </div>
    </div>
    
    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="subject : ${subjects}">
            <div class="card progress-card h-100">
                <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-3 gap-3">
                        <div>
                            <h5 class="fw-bold mb-1" th:text="${subject.subjectName}">Môn học</h5>
                        </div>
                        
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2">
                            <small class="text-muted d-block" style="font-size: 0.7rem; margin-bottom: 4px;">Hoàn thành:</small>
                            <span th:text="${subject.overallPercentage}">0</span>%
                        </span>
                    </div>
                    
                    <div class="mb-4">
                        <div class="progress" style="height: 12px; border-radius: 999px;">
                            <div class="progress-bar"
                                 role="progressbar"
                                 th:style="'width:' + ${subject.overallPercentage} + '%;'"
                                 th:aria-valuenow="${subject.overallPercentage}"
                                 aria-valuemin="0"
                                 aria-valuemax="100">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <div class="border rounded-4 p-3 text-center h-100">
                                <div class="small text-muted mb-1">Hoàn thành</div>
                                <div class="fw-bold fs-5" th:text="${subject.completedTopics} +'/'+ ${subject.totalTopics}">0</div>
                                <div class="small text-muted mb-1">chương</div>
                            </div>
                        </div>
                        
                        <div class="col-6">
                            <div class="border rounded-4 p-3 text-center h-100">
                                <div class="small text-muted mb-1">Hoàn thành</div>
                                <div class="fw-bold fs-5" th:text="${subject.completedQuizzes} +'/'+ ${subject.totalQuizzes}">0</div>
                                <div class="small text-muted mb-1">quiz</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-auto">
                        <a th:href="@{/progress/subject/{id}(id=${subject.subjectId})}"
                           class="btn btn-primary w-100 rounded-pill">
                            <i class="bi bi-arrow-right-circle me-1"></i> Xem chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
