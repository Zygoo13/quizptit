<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết môn học - QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/progress}">Tiến độ</a></li>
                <li class="breadcrumb-item active">Danh sách chương</li>
            </ol>
        </nav>

        <div class="bg-white p-4 rounded shadow-sm mb-4">
            <h3 class="fw-bold mb-0">Các chương trong môn học</h3>
        </div>

        <div class="list-group shadow-sm">
            <div class="list-group-item list-group-item-action p-4" th:each="t : ${topics}">
                <div class="row align-items-center">
                    <div class="col-md-5">
                        <h5 class="mb-1 fw-bold" th:text="${t.topicName}">Tên chương</h5>
                        <small class="text-muted" th:text="'Tổng số: ' + ${t.totalQuizzes} + ' bài Quiz'"></small>
                    </div>
                    <div class="col-md-3">
                        <div class="text-center">
                            <small class="text-muted d-block">Điểm trung bình chương</small>
                            <span class="fs-5 fw-bold text-success" th:text="${#numbers.formatDecimal(t.averageScore * 10, 1, 1)}">0.00</span>
                        </div>
                    </div>
                    <div class="col-md-2 text-center">
                        <small class="text-muted d-block">Đã hoàn thành</small>
                        <span class="badge bg-info text-dark" th:text="${t.completedQuizzes} + '/' + ${t.totalQuizzes}"></span>
                    </div>
                    <div class="col-md-2 text-end">
                        <a th:href="@{/quizzes}" class="btn btn-sm btn-primary">
                            Xem các Quiz
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
