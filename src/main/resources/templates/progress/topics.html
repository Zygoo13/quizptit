<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Tiến độ theo chương', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Tiến độ theo chương</h3>
            <p class="text-muted mb-0">
                Theo dõi mức độ hoàn thành quiz trong từng chương.
            </p>
        </div>
        
        <a th:href="@{/progress}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-1"></i> Quay lại môn học
        </a>
    </div>
    
    <div th:if="${#lists.isEmpty(topics)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5 text-muted">
            Chưa có dữ liệu chương cho môn học này.
        </div>
    </div>
    
    <div class="d-flex flex-column gap-4">
        <div th:each="topic : ${topics}" class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-3">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${topic.topicName}">Tên chương</h5>
                    </div>
                    
                    <div class="d-flex gap-2 flex-wrap">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2">
                            <small class="text-muted d-block" style="font-size: 0.7rem; margin-bottom: 4px;">Điểm trung bình:</small>
                            <span th:text="${topic.averageScore}*100 + '/100'">0</span>
                        </span>
                        <span class="badge bg-info-subtle text-info border border-info-subtle rounded-pill px-3 py-2"
                              th:if="${topic.progressPercentage != null}">
                            <small class="text-muted d-block" style="font-size: 0.7rem; margin-bottom: 4px;">Hoàn thành:</small>
                            <span th:text="${topic.progressPercentage}">0</span>%
                        </span>
                    </div>
                </div>
                
                <div class="progress mb-4" style="height: 12px; border-radius: 999px;">
                    <div class="progress-bar"
                         role="progressbar"
                         th:style="'width:' + ${(topic.totalQuizzes != null and topic.totalQuizzes > 0) ? (topic.completedQuizzes * 100.0 / topic.totalQuizzes) : 0} + '%;'">
                    </div>
                </div>
                
                <a th:href="@{/progress/topic/{id}(id=${topic.topicId})}"
                   class="btn btn-primary rounded-pill px-4">
                    <i class="bi bi-list-check me-1"></i> Danh sách Quiz
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
