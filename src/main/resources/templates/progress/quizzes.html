<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Quiz - QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-center mb-4">
                    <a th:href="javascript:history.back()" class="btn btn-link text-decoration-none p-0 me-3">
                        <i class="bi bi-chevron-left fs-4"></i>
                    </a>
                    <h3 class="fw-bold mb-0">Nội dung chương học</h3>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="list-group list-group-flush">
                        <div class="list-group-item p-3" th:each="q : ${quizzes}">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <div class="me-3">
                                        <i th:if="${q.completed}" class="bi bi-check-circle-fill text-success fs-3"></i>
                                        <i th:unless="${q.completed}" class="bi bi-circle text-secondary fs-3"></i>
                                    </div>
                                    <div>
                                        <h6 class="mb-0 fw-bold" th:text="${q.title}">Tên bài Quiz</h6>
                                        <small class="text-muted" th:if="${q.completed}" 
                                               th:text="'Điểm cao nhất: ' + ${q.highestScore}"></small>
                                        <small class="text-danger" th:unless="${q.completed}">Chưa hoàn thành</small>
                                    </div>
                                </div>
                                <a th:href="@{/quiz/{id}(id=${q.quizId})}" class="btn btn-sm"
                                   th:classappend="${q.completed} ? 'btn-outline-secondary' : 'btn-primary'">
                                   <span th:text="${q.completed} ? 'Làm lại' : 'Bắt đầu ngay'"></span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
