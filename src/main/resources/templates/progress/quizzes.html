<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Tiến độ theo quiz', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Trạng thái quiz trong chương</h3>
            <p class="text-muted mb-0">
                Xem trạng thái hoàn thành và điểm cao nhất của từng quiz.
            </p>
        </div>
        
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Tên quiz</th>
                        <th>Điểm cao nhất</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(quizzes)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            Chưa có quiz nào trong chương này.
                        </td>
                    </tr>
                    
                    <tr th:each="quiz : ${quizzes}">
                        <td class="ps-4 fw-bold text-primary" th:text="${quiz.quizId}">1</td>
                        
                        <td>
                            <div class="fw-semibold" th:text="${quiz.title}">Quiz title</div>
                        </td>
                        
                        <td>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${quiz.highestScore}">
                            0
                        </span>
                        </td>
                        
                        <td>
                        <span th:if="${quiz.completed}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-check-circle-fill me-1"></i> Đã đạt
                        </span>
                            <span th:unless="${quiz.completed}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-hourglass-split me-1"></i> Chưa đạt
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <a th:href="@{/quizzes/{id}(id=${quiz.quizId})}"
                               class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                <i class="bi bi-eye me-1"></i> Xem quiz
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
