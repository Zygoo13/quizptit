<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('403 - Forbidden')}"></head>
<body>
<div class="container py-5">
    <div class="app-card">
        <h1>403 - Forbidden</h1>
        <p th:text="${errorMessage != null ? errorMessage : 'You do not have permission to access this page.'}">
            You do not have permission to access this page.
        </p>
        <a class="btn btn-primary btn-sm" th:href="@{/}">Back Home</a>
    </div>
</div>
</body>
</html>
