<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/public-layout :: layout('Forbidden', ~{::content})}">
<head></head>
<body>
<div th:fragment="content" class="text-center">
    <div class="display-1 fw-bold text-danger mb-3">403</div>
    <h3 class="fw-bold mb-3" th:text="${errorTitle != null ? errorTitle : 'Forbidden'}">Forbidden</h3>
    <p class="text-muted mb-3"
       th:text="${errorMessage != null ? errorMessage : 'Bạn không được phép thực hiện thao tác này.'}">
        Bạn không được phép truy cập.
    </p>
    <p class="small text-muted mb-4" th:if="${path != null}">
        Path:
        <code th:text="${path}">/path</code>
    </p>
    
    <div class="d-flex flex-wrap justify-content-center gap-2">
        <a th:href="@{/}" class="btn btn-primary rounded-pill px-4">Trang chủ</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">Quay lại</a>
    </div>
</div>
</body>
</html>
