<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top" th:fragment="navbar">
    <style>
        .navbar-brand {
            font-weight: 800;
            color: #0d6efd !important;
            letter-spacing: -0.5px;
        }

        .nav-link {
            font-weight: 500;
            color: #495057 !important;
            padding: 0.5rem 1rem !important;
            transition: color 0.2s ease;
            border-radius: 6px;
        }

        .nav-link:hover {
            color: #0d6efd !important;
            background-color: #f8f9fa;
        }

        .nav-link.active {
            color: #0d6efd !important;
            background-color: #e7f1ff;
        }

        .navbar-user-actions .btn {
            font-weight: 600;
            border-radius: 8px;
            padding: 0.4rem 1rem;
        }
    </style>
    
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="bi bi-mortarboard-fill me-2"></i> QuizPTIT
        </a>
        
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNavbar" aria-controls="mainNavbar"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${requestURI == '/' ? 'active' : ''}"
                       th:href="@{/}">
                        Trang chủ
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${requestURI.startsWith('/subjects') or requestURI.startsWith('/topics') ? 'active' : ''}"
                       th:href="@{/subjects}">
                        Môn học
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${requestURI.startsWith('/quizzes') ? 'active' : ''}"
                       th:href="@{/quizzes}">
                        Kiểm tra
                    </a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${requestURI.startsWith('/community') ? 'active' : ''}"
                       th:href="@{/community/questions}">
                        Cộng đồng
                    </a>
                </li>
                
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle"
                       href="#"
                       id="learningDropdown"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">
                        Cá nhân hóa
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm" aria-labelledby="learningDropdown">
                        <li>
                            <a class="dropdown-item" th:href="@{/quizzes/random}">
                                <i class="bi bi-shuffle me-2"></i> Luyện tập ngẫu nhiên
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/progress}">
                                <i class="bi bi-graph-up-arrow me-2"></i> Tiến độ học tập
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/review/suggestions}">
                                <i class="bi bi-lightbulb me-2"></i> Gợi ý ôn tập
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/quizzes/history}">
                                <i class="bi bi-clock-history me-2"></i> Lịch sử làm bài
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            
            <div class="navbar-user-actions d-flex align-items-center gap-2">
                <a sec:authorize="hasRole('ADMIN')" class="btn btn-warning btn-sm shadow-sm" th:href="@{/admin}">
                    <i class="bi bi-shield-lock me-1"></i> Admin
                </a>
                
                <a sec:authorize="isAuthenticated()" class="btn btn-outline-primary btn-sm" th:href="@{/profile}">
                    <i class="bi bi-person-circle me-1"></i> Hồ sơ
                </a>
                
                <a sec:authorize="isAnonymous()" class="btn btn-outline-primary btn-sm" th:href="@{/auth/login}">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
                </a>
                
                <a sec:authorize="isAnonymous()" class="btn btn-primary btn-sm" th:href="@{/auth/register}">
                    <i class="bi bi-person-plus me-1"></i> Đăng ký
                </a>
                
                <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
