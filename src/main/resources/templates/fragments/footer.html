    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <body>
    <footer th:fragment="footer" class="footer mt-auto py-4 bg-white border-top">
        <style>
            .footer {
                color: #6c757d;
            }
            .footer-link {
                text-decoration: none;
                color: #6c757d;
                transition: color 0.2s;
                font-size: 0.9rem;
            }
            .footer-link:hover {
                color: #0d6efd;
            }
            .footer-brand {
                font-weight: 700;
                color: #212529;
            }
        </style>
        
        <div class="container">
            <div class="row align-items-center">
                <!-- Cột bên trái: Brand & Copyright -->
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="footer-brand">QuizPTIT</span>
                    <span class="mx-2">|</span>
                    <span class="small">
                        &copy; <span th:text="${#calendars.year(#calendars.createNow())}">2026</span>
                        - Dự án thực hành tích hợp Module
                    </span>
                </div>
                
                <!-- Cột bên phải: Links hữu ích -->
                <div class="col-md-6 text-center text-md-end">
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item me-3">
                            <a th:href="@{/}" class="footer-link">Trang chủ</a>
                        </li>
                        <li class="list-inline-item me-3">
                            <a href="#" class="footer-link">Điều khoản</a>
                        </li>
                        <li class="list-inline-item me-3">
                            <a href="#" class="footer-link">Bảo mật</a>
                        </li>
                        <li class="list-inline-item">
                            <span class="badge bg-light text-dark border">v1.0.0</span>
                        </li>
                    </ul>
                </div>
            </div>
            
            <!-- Dòng chú thích kỹ thuật (giữ lại ý của bạn) -->
            <div class="row mt-3">
                <div class="col-12 text-center">
                    <hr class="my-2 opacity-25">
                    <div class="small text-muted italic" style="font-size: 0.75rem;">
                        <i class="bi bi-code-slash me-1"></i> Frontend baseline for module integration - PTIT Student Project
                    </div>
                </div>
            </div>
        </div>
    </footer>
    </body>
    </html>
