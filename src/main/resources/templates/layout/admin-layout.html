<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content, script)">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 py-4">
    <div class="container-fluid px-3 px-lg-4">
        <div th:replace="~{fragments/flash-message :: flash-message}"></div>
        
        <div class="row g-4">
            <div class="col-lg-3 col-xl-2">
                <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>
            </div>
            
            <div class="col-lg-9 col-xl-10">
                <div th:insert="${content}">
                    Nội dung admin
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
<div th:if="${script != null}">
    <div th:replace="${script}"></div>
</div>
</body>
</html>
