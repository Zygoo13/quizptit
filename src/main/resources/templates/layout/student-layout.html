<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content)">

<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>

<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div th:replace="~{fragments/flash-message :: flash-message}"></div>
        
        <div class="app-card shadow-sm border-0">
            <div th:insert="${content}">
                <p class="text-muted italic">Nội dung trang đang được tải...</p>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

<style>
    body {
        background-color: #f4f7f6;
    }

    .app-card {
        background: #ffffff;
        border-radius: 15px;
        padding: 2rem;
    }
</style>
</body>
</html>
