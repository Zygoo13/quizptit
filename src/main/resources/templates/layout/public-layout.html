<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle + ' - QuizPTIT'}">QuizPTIT</title>
    
    <!-- CHUẨN HÓA: Sử dụng đường dẫn static cục bộ của bạn -->
    <link rel="stylesheet" th:href="@{/bootstrap/5.3.8/css/bootstrap.min.css}">
    <!-- Thêm Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #003d99 100%);
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .public-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Tạo hiệu ứng nền nhẹ nhàng */
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .public-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .public-card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .brand-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 5px;
            display: inline-block;
        }

        .brand-subtitle {
            color: #6c757d;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .public-footer {
            text-align: center;
            color: #adb5bd;
            font-size: 0.85rem;
            padding: 24px;
        }

        /* Tùy chỉnh các nút bấm bên trong layout này */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 8px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e0e0e0;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
<div class="public-wrapper">
    <main class="public-main">
        <div class="public-card">
            <!-- Phần thông báo lỗi/thành công dùng chung cho Auth -->
            <div th:replace="~{fragments/flash-message :: flash-message}"></div>
            
            <div class="brand-box">
                <a th:href="@{/}" class="text-decoration-none">
                    <div class="brand-logo">QuizPTIT</div>
                </a>
                <div class="brand-subtitle">Nền tảng ôn thi trắc nghiệm PTIT</div>
            </div>
            
            <!-- Nơi chứa nội dung cụ thể của trang Login/Register -->
            <div th:insert="${content}">
                Nội dung trang
            </div>
        </div>
    </main>
    
    <footer class="public-footer">
        &copy; 2026 QuizPTIT - Hệ thống hỗ trợ học tập sinh viên
    </footer>
</div>

<!-- Scripts -->
<script th:src="@{/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
