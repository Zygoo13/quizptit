<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Hồ sơ cá nhân', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .profile-avatar-lg {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            overflow: hidden;
        }

        .profile-avatar-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info-box {
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 1rem;
            background: #fff;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Hồ sơ cá nhân</h3>
            <p class="text-muted mb-0">
                Cập nhật thông tin cơ bản và đổi mật khẩu tài khoản của bạn.
            </p>
        </div>
        
        <a th:href="@{/}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-1"></i> Về trang chủ
        </a>
    </div>
    
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <div class="profile-avatar-lg mx-auto mb-3">
                            <img th:if="${currentAvatarUrl != null and !#strings.isEmpty(currentAvatarUrl)}"
                                 th:src="@{${currentAvatarUrl}}"
                                 alt="Avatar">
                            
                            <span th:if="${currentAvatarUrl == null or #strings.isEmpty(currentAvatarUrl)}"
                                  th:text="${updateProfileForm != null and updateProfileForm.fullName != null and !#strings.isEmpty(updateProfileForm.fullName)} ? ${#strings.substring(updateProfileForm.fullName,0,1)} : 'U'">
                                U
                            </span>
                        </div>
                        
                        <h4 class="fw-bold mb-1"
                            th:text="${updateProfileForm != null and updateProfileForm.fullName != null and !#strings.isEmpty(updateProfileForm.fullName)} ? ${updateProfileForm.fullName} : 'Người dùng'">
                            Người dùng
                        </h4>
                        
                        <div class="text-muted mb-3"
                             th:text="${currentUserEmail != null ? currentUserEmail : 'email@example.com'}">
                            email@example.com
                        </div>
                        
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${currentUserRole != null ? currentUserRole : 'STUDENT'}">
                            STUDENT
                        </span>
                    </div>
                    
                    <div class="d-flex flex-column gap-3">
                        <div class="profile-info-box">
                            <div class="small text-muted mb-1">User ID</div>
                            <div class="fw-semibold" th:text="${currentUserId != null ? currentUserId : '---'}">---</div>
                        </div>
                        
                        <div class="profile-info-box">
                            <div class="small text-muted mb-1">Email đăng nhập</div>
                            <div class="fw-semibold" th:text="${currentUserEmail != null ? currentUserEmail : '---'}">---</div>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4 p-lg-5">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-person-lines-fill me-2"></i>Cập nhật thông tin
                    </h5>
                    
                    <div th:if="${profileErrorMessage}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${profileErrorMessage}"></span>
                    </div>
                    
                    <form th:action="@{/profile}"
                          th:object="${updateProfileForm}"
                          method="post"
                          enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên</label>
                            <input type="text"
                                   th:field="*{fullName}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid' : ''"
                                   placeholder="Nhập họ và tên">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Ảnh đại diện</label>
                            <input type="file"
                                   name="avatarFile"
                                   class="form-control"
                                   accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png,image/gif,image/webp">
                            <div class="form-text">
                                Hỗ trợ JPG, PNG, GIF, WEBP. Kích thước tối đa theo cấu hình hệ thống.
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-save me-1"></i> Lưu thông tin
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-shield-lock me-2"></i>Đổi mật khẩu
                    </h5>
                    
                    <div th:if="${passwordErrorMessage}" class="alert alert-danger">
                        <i class="bi bi-exclamation-octagon-fill me-2"></i>
                        <span th:text="${passwordErrorMessage}"></span>
                    </div>
                    
                    <form th:action="@{/profile/change-password}"
                          th:object="${changePasswordForm}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                            <input type="password"
                                   th:field="*{currentPassword}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid' : ''"
                                   placeholder="Nhập mật khẩu hiện tại">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('currentPassword')}"
                                 th:errors="*{currentPassword}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu mới</label>
                            <input type="password"
                                   th:field="*{newPassword}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid' : ''"
                                   placeholder="Ít nhất 8 ký tự">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('newPassword')}"
                                 th:errors="*{newPassword}">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                            <input type="password"
                                   th:field="*{confirmNewPassword}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmNewPassword')} ? ' is-invalid' : ''"
                                   placeholder="Nhập lại mật khẩu mới">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('confirmNewPassword')}"
                                 th:errors="*{confirmNewPassword}">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-arrow-repeat me-1"></i> Cập nhật mật khẩu
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
