<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Gợi ý ôn tập', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Gợi ý ôn tập</h3>
            <p class="text-muted mb-0">
                Danh sách các câu hỏi cần ôn lại dựa trên lịch ôn và mức độ ghi nhớ.
            </p>
        </div>
        
        <span class="badge bg-info-subtle text-info border border-info-subtle rounded-pill px-3 py-2"
              th:text="${#lists.size(suggestions)} + ' câu hỏi'">
            0 câu hỏi
        </span>
    </div>
    
    <div th:if="${param.success}" class="alert alert-success border-0 shadow-sm">
        <i class="bi bi-check-circle-fill me-2"></i> Đã ghi nhận kết quả ôn tập.
    </div>
    
    <div th:if="${#lists.isEmpty(suggestions)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="display-6 text-muted mb-3">
                <i class="bi bi-stars"></i>
            </div>
            <h5 class="fw-bold mb-2">Hiện chưa có câu nào cần ôn</h5>
            <p class="text-muted mb-0">
                Bạn đang theo khá tốt lịch ôn tập hiện tại.
            </p>
        </div>
    </div>
    
    <div class="d-flex flex-column gap-3">
        <div th:each="item : ${suggestions}" class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-start gap-3">
                    <div class="flex-grow-1">
                        <div class="d-flex gap-2 flex-wrap mb-2">
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2"
                                  th:text="${item.subjectName}">
                                Môn học
                            </span>
                            
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${item.isOverdue} ? 'bg-danger-subtle text-danger border border-danger-subtle' : 'bg-warning-subtle text-warning border border-warning-subtle'">
                                <span th:text="${item.isOverdue} ? 'Đến hạn ôn' : 'Sắp đến hạn'">Đến hạn ôn</span>
                            </span>
                        </div>
                        
                        <h6 class="fw-bold mb-2" th:text="${item.contentSnippet}">Nội dung câu hỏi</h6>
                        
                        <div class="small text-muted d-flex flex-wrap gap-3">
                            <span>
                                <i class="bi bi-calendar-event me-1"></i>
                                Ôn tiếp:
                                <span th:text="${item.nextReviewAt != null ? #temporals.format(item.nextReviewAt, 'dd/MM/yyyy') : '---'}">
                                    12/04/2026
                                </span>
                            </span>
                            
                            <span th:if="${item.memoryScore != null}">
                                <i class="bi bi-graph-up-arrow me-1"></i>
                                Memory score:
                                <span th:text="${#numbers.formatDecimal(item.memoryScore * 100, 1, 2)} + '/100'">0/100</span>
                            </span>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 flex-shrink-0">
                        <a th:href="@{/review/session/start(questionId=${item.questionId})}"
                           class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-play-circle me-1"></i> Bắt đầu ôn
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
