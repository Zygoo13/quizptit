<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ôn tập môn học | QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .mastery-progress { height: 8px; border-radius: 4px; background-color: #e9ecef; }
        .question-card:hover { border-color: #0d6efd; transform: translateY(-2px); transition: 0.2s; }
        .streak-badge { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <a th:href="@{/review}" class="btn btn-outline-secondary rounded-circle me-3 shadow-sm" title="Quay lại Dashboard">
                <i class="fas fa-arrow-left"></i>
            </a>
            
            <div>
                <h2 class="fw-bold text-primary mb-0">
                    <i class="fas fa-book-reader me-2"></i>
                    Ôn tập: <span th:text="${subjectName}">Tên môn học</span>
                </h2>
                <small class="text-muted" th:if="${not #lists.isEmpty(questions)}">
                    Hôm nay bạn cần hoàn thành <span th:text="${questions.size()}">0</span> câu hỏi.
                </small>
            </div>
        </div>

        <div th:if="${not #lists.isEmpty(questions)}">
            <a th:href="@{/review/subject/{id}/all(id=${subjectId})}" class="btn btn-success btn-lg rounded-pill shadow-sm px-4">
                <i class="fas fa-play-circle me-2"></i> Ôn tập tất cả
            </a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(questions)}" class="card shadow-sm border-0 text-center py-5">
        <div class="card-body">
            <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
            <h3>Tuyệt vời!</h3>
            <p class="text-muted">Bạn đã hoàn thành tất cả các mục tiêu ôn tập của môn này.</p>
            <a th:href="@{/review}" class="btn btn-primary px-4">Khám phá môn khác</a>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(questions)}" class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-white">
                    <tr>
                        <th class="ps-4 py-3" style="width: 50%;">Nội dung câu hỏi</th>
                        <th style="width: 20%;">Độ thông thạo</th>
                        <th style="width: 15%;">Chuỗi đúng</th>
                        <th class="text-end pe-4">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="q : ${questions}" class="question-card">
                        <td class="ps-4">
                            <div class="fw-semibold text-dark text-truncate" style="max-width: 400px;" 
                                 th:text="${q.content}">
                                Nội dung câu hỏi...
                            </div>
                        </td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="progress mastery-progress flex-grow-1 me-2">
                                    <div class="progress-bar bg-success" role="progressbar" 
                                         th:style="'width: ' + (${q.memoryScore} * 100) + '%'"></div>
                                </div>
                                <small class="text-muted fw-bold" 
                                       th:text="${#numbers.formatDecimal(q.memoryScore * 100, 0, 0)} + '%'"></small>
                            </div>
                        </td>
                        <td>
                            <span class="badge streak-badge rounded-pill">
                                <i class="fas fa-fire text-warning me-1"></i>
                                <span th:text="${q.correctStreak}">0</span>
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/review/session/start(questionId=${q.questionId})}" 
                                class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                    Ôn tập ngay
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
