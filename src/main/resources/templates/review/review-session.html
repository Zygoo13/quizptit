<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Phiên Ôn Tập - QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-soft: #e7f1ff;
            --success-soft: #d1e7dd;
            --danger-soft: #f8d7da;
        }
        .option-box {
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid #dee2e6 !important;
            background-color: #fff;
            position: relative;
            display: flex;
            align-items: center;
            min-height: 65px;
        }
        .option-box:hover:not(.disabled) {
            border-color: #0d6efd !important;
            background-color: var(--primary-soft);
            transform: translateX(5px);
        }
        .option-box.selected {
            border-color: #0d6efd !important;
            background-color: var(--primary-soft);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        }
        /* Trạng thái đúng */
        .option-box.correct {
            border-color: #198754 !important;
            background-color: var(--success-soft) !important;
            color: #0a3622;
        }
        /* Trạng thái sai */
        .option-box.wrong {
            border-color: #dc3545 !important;
            background-color: var(--danger-soft) !important;
            color: #58151c;
        }
        .disabled { 
            pointer-events: none; 
            opacity: 0.8;
        }
        .status-icon {
            font-size: 1.25rem;
            margin-left: auto;
        }
        #feedback-area {
            border-radius: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-7">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="/review" class="text-decoration-none">Review</a></li>
                                <li class="breadcrumb-item active">Ôn tập câu hỏi</li>
                            </ol>
                        </nav>
                    </div>

                    <div class="card-body p-4">
                        <div class="mb-4">
                            <span class="badge bg-primary mb-2 px-3 py-2 rounded-pill">Câu hỏi</span>
                            <h4 class="fw-bold text-dark lh-base" th:text="${question.content}">Nội dung câu hỏi?</h4>
                        </div>
                        
                        <div id="options-container" class="d-grid gap-3">
                            <div th:each="opt, iterStat : ${question.options}" 
                                 class="option-box p-3 rounded-3 shadow-sm"
                                 th:onclick="|selectOption(this, ${opt.optionId})|"
                                 th:id="'opt-' + ${opt.optionId}">
                                
                                <div class="d-flex align-items-center w-100">
                                    <div class="me-3 fw-bold text-primary" 
                                         th:text="${#strings.arraySplit('A,B,C,D', ',')[iterStat.index]} + '.'"></div>
                                    
                                    <div class="option-text pe-4" th:text="${opt.content}">Nội dung đáp án</div>
                                    
                                    <i class="fas status-icon d-none"></i>
                                </div>
                            </div>
                        </div>

                        <div id="feedback-area" class="alert mt-4 d-none animate__animated animate__fadeIn">
                            <div class="d-flex align-items-center">
                                <i id="feedback-icon" class="fas fa-2x me-3"></i>
                                <div id="feedback-msg"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-white border-0 pb-4 px-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-light text-secondary" onclick="history.back()">
                                <i class="fas fa-chevron-left me-2"></i> Quay lại
                            </button>
                            
                            <div class="action-buttons">
                                <button id="submit-btn" class="btn btn-primary btn-lg px-5 rounded-pill shadow" 
                                        onclick="handlePreviewSubmit()" disabled>
                                    Nộp bài <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                                <button id="next-btn" class="btn btn-success btn-lg px-5 rounded-pill shadow d-none" 
                                        onclick="window.location.href='/review/suggestions'">
                                    Câu tiếp theo <i class="fas fa-arrow-right ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        let selectedId = null;
        const questionId = [[${question.questionId}]];

        function selectOption(element, id) {
            // Xóa trạng thái các ô cũ
            document.querySelectorAll('.option-box').forEach(el => el.classList.remove('selected'));
            
            // Đánh dấu ô mới
            element.classList.add('selected');
            selectedId = id;
            
            // Kích hoạt nút nộp bài
            document.getElementById('submit-btn').disabled = false;
        }

        function handlePreviewSubmit() {
            // Lấy CSRF Token
            const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
            const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

            fetch('/review/api/submit', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    [header]: token // Gửi kèm CSRF Token ở đây
                },
                body: JSON.stringify({ questionId: questionId, optionId: selectedId })
            })
            .then(res => {
                if (!res.ok) throw new Error('Server error: ' + res.status);
                return res.json();
            })
            .then(data => {
                showResult(data);
            })
            .catch(err => {
                console.error("Lỗi chi tiết:", err);
                alert("Lỗi: " + err.message);
            });
        }

        function showResult(data) {
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackMsg = document.getElementById('feedback-msg');

            // Xóa sạch các class màu sắc cũ để tránh bị đè màu
            feedbackArea.classList.remove('d-none', 'alert-success', 'alert-danger');
            
            // Gán class mới dựa trên dữ liệu thật từ Server
            if (data.isCorrect) {
                feedbackArea.classList.add('alert-success');
                feedbackMsg.innerHTML = `<h5 class="alert-heading mb-1">Tuyệt vời!</h5><span>${data.feedbackMessage}</span>`;
            } else {
                feedbackArea.classList.add('alert-danger');
                feedbackMsg.innerHTML = `<h5 class="alert-heading mb-1">Cố gắng lên!</h5><span>${data.feedbackMessage}</span>`;
            }

            // Highlight các ô đáp án
            document.querySelectorAll('.option-box').forEach(el => {
                const optId = parseInt(el.id.replace('opt-', ''));
                el.classList.add('disabled');
                const icon = el.querySelector('.status-icon');
                
                if (optId === data.correctOptionId) {
                    el.classList.add('correct');
                    icon.className = 'fas fa-check-circle status-icon';
                    icon.classList.remove('d-none');
                } else if (optId === selectedId && !data.isCorrect) {
                    el.classList.add('wrong');
                    icon.className = 'fas fa-times-circle status-icon';
                    icon.classList.remove('d-none');
                }
            });

            document.getElementById('submit-btn').classList.add('d-none');
            document.getElementById('next-btn').classList.remove('d-none');
        }
    </script>
</body>
</html>
