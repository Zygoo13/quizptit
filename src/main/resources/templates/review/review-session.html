<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Phiên Ôn Tập - QuizPTIT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Câu hỏi ôn tập</h4>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title mb-4" th:text="${question.content}">Nội dung câu hỏi?</h5>

                        <form th:action="@{/review/session/submit}" method="post">
                            <input type="hidden" name="questionId" th:value="${question.questionId}">
                            
                            <div class="d-flex flex-column gap-3 mb-4">
                                <div th:each="opt : ${question.options}" class="form-check p-3 border rounded shadow-sm">
                                    <input class="form-check-input ms-0 me-2" type="radio" 
                                        name="chosenOptionId" 
                                        th:value="${opt.optionId}" 
                                        th:id="'opt-' + ${opt.optionId}" required>
                                    <label class="form-check-label w-100" th:for="'opt-' + ${opt.optionId}" 
                                        th:text="${opt.content}">Nội dung đáp án</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Nộp câu trả lời</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
