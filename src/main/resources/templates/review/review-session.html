<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Phiên ôn tập', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .review-option-card {
            border: 1px solid #e9ecef;
            border-radius: 14px;
            padding: 14px 16px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .review-option-card:hover {
            border-color: #0d6efd;
            background: #f8fbff;
        }
    </style>
    
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                        <div>
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2 mb-3">
                                Ôn tập cá nhân hóa
                            </span>
                            <h3 class="fw-bold mb-2">Làm lại câu hỏi cần ôn</h3>
                            <p class="text-muted mb-0">
                                Chọn đáp án tốt nhất cho câu hỏi dưới đây.
                            </p>
                        </div>
                        
                        <a th:href="@{/review/suggestions}"
                           class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-arrow-left me-1"></i> Quay lại
                        </a>
                    </div>
                    
                    <div class="border rounded-4 p-4 mb-4 bg-light-subtle">
                        <h5 class="fw-bold mb-0" th:text="${question.content}">
                            Nội dung câu hỏi
                        </h5>
                    </div>
                    
                    <form th:action="@{/review/session/submit}" method="post">
                        <input type="hidden" name="questionId" th:value="${question.questionId}">
                        <input type="hidden" name="subjectId" th:value="${subjectId}">
                        
                        <div class="d-flex flex-column gap-3 mb-4">
                            <label th:each="option : ${question.options}"
                                   class="review-option-card d-flex align-items-start gap-3">
                                <input class="form-check-input mt-1"
                                       type="radio"
                                       name="selectedOptionId"
                                       th:value="${option.optionId}"
                                       required>
                                
                                <div class="flex-grow-1">
                                    <div class="fw-semibold mb-1"
                                         th:text="${option.optionLabel} + '.'">
                                        A.
                                    </div>
                                    <div th:text="${option.content}">Nội dung đáp án</div>
                                </div>
                            </label>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-4">
                                <i class="bi bi-check2-circle me-1"></i> Xác nhận đáp án
                            </button>
                            
                            <a th:if="${subjectId != null}"
                               th:href="@{/review/session/next(subjectId=${subjectId})}"
                               class="btn btn-outline-secondary rounded-pill px-4">
                                Bỏ qua câu này
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
