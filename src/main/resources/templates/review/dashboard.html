<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Dashboard ôn tập', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Dashboard ôn tập</h3>
            <p class="text-muted mb-0">
                Theo dõi số câu cần ôn theo từng môn học và bắt đầu phiên ôn tập nhanh.
            </p>
        </div>
        
        <a th:href="@{/review/suggestions}" class="btn btn-primary rounded-pill px-4">
            <i class="bi bi-lightbulb me-1"></i> Xem gợi ý hôm nay
        </a>
    </div>
    
    <div th:if="${#lists.isEmpty(subjects)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="display-6 text-muted mb-3">
                <i class="bi bi-journal-check"></i>
            </div>
            <h5 class="fw-bold mb-2">Chưa có dữ liệu ôn tập</h5>
            <p class="text-muted mb-0">Sau khi làm bài và nộp bài, hệ thống sẽ sinh dữ liệu ôn tập cá nhân hóa.</p>
        </div>
    </div>
    
    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="subject : ${subjects}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4 d-flex flex-column">
                    <h5 class="fw-bold mb-3 text-primary" th:text="${subject.subjectName}">Tên môn học</h5>
                    
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <div class="small text-muted mb-1">Cần ôn tập</div>
                            <div class="fs-4 fw-bold text-danger" th:text="${subject.totalReviewCount}">0</div>
                        </div>
                        <div class="text-end">
                            <div class="small text-muted mb-1">Độ thông thạo</div>
                            <div class="fw-bold text-dark" th:text="${subject.averageScore != null ? #numbers.formatDecimal(subject.averageScore * 100, 1, 0) : 0} + '%'">0%</div>
                        </div>
                    </div>

                    <div class="progress mb-3" style="height: 6px;">
                        <div class="progress-bar bg-primary" role="progressbar" 
                            th:style="'width: ' + (${subject.averageScore != null ? subject.averageScore * 100 : 0}) + '%'"></div>
                    </div>
                    
                    <div class="mt-auto">
                        <a th:href="@{/review/suggestions}"
                           class="btn btn-outline-primary w-100 rounded-pill">
                            Xem gợi ý ôn tập
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
