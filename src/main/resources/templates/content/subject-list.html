<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách môn học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Danh sách môn học</h2>
    
    <form class="mb-4" action="/subjects" method="get">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="Tìm kiếm môn học..." th:value="${keyword}">
            <button class="btn btn-primary" type="submit">Tìm kiếm</button>
        </div>
    </form>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="subject : ${subjects.content}">
            <div class="card h-100 shadow-sm border-0 bg-light">
                <div class="card-body">
                    <h5 class="card-title text-primary fw-bold" th:text="${subject.subjectName}">Môn học</h5>
                    <p class="card-text text-muted small" th:text="${subject.description}">Mô tả</p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/subjects/{id}(id=${subject.subjectId})}" class="btn btn-sm btn-primary">Chi tiết</a>
                        <a th:href="@{/subjects/{id}/topics(id=${subject.subjectId})}" class="btn btn-sm btn-outline-secondary">Chủ đề</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${subjects.empty}" class="col-12 text-center py-5">
            <p class="text-muted">Không tìm thấy môn học nào trong hệ thống.</p>
        </div>
    </div>
</div>
</body>
</html>
