<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Danh sách môn học', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .subject-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .subject-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
        }

        .subject-desc {
            min-height: 48px;
            color: #6c757d;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Danh sách môn học</h3>
            <p class="text-muted mb-0">
                Chọn môn học để xem các chủ đề và bắt đầu ôn luyện.
            </p>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form th:action="@{/subjects}" method="get" class="row g-3 align-items-end">
                <div class="col-lg-9">
                    <label class="form-label fw-semibold">Tìm kiếm môn học</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text"
                               name="keyword"
                               class="form-control"
                               th:value="${keyword}"
                               placeholder="Nhập tên môn hoặc mô tả">
                    </div>
                </div>
                
                <div class="col-lg-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel me-1"></i> Tìm
                    </button>
                    <a th:href="@{/subjects}" class="btn btn-outline-secondary flex-fill">Làm mới</a>
                </div>
            </form>
        </div>
    </div>
    
    <div th:if="${subjects == null or #lists.isEmpty(subjects.content)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="display-6 text-muted mb-3">
                <i class="bi bi-book"></i>
            </div>
            <h5 class="fw-bold mb-2">Chưa có môn học phù hợp</h5>
            <p class="text-muted mb-0">Hiện chưa có dữ liệu khớp với từ khóa bạn nhập.</p>
        </div>
    </div>
    
    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="subject : ${subjects.content}">
            <div class="card subject-card h-100">
                <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2">
                            Môn học
                        </span>
                        
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${subject.isActive} ? 'Hiển thị' : 'Ẩn'">
                            Hiển thị
                        </span>
                    </div>
                    
                    <h5 class="fw-bold mb-2" th:text="${subject.subjectName}">Tên môn học</h5>
                    
                    <div class="subject-desc mb-4"
                         th:text="${subject.description != null and !#strings.isEmpty(subject.description)} ? ${subject.description} : 'Chưa có mô tả cho môn học này.'">
                        Mô tả môn học
                    </div>
                    
                    <div class="small text-muted mb-4">
                        <i class="bi bi-calendar-event me-1"></i>
                        <span th:text="${subject.createdAt != null ? #temporals.format(subject.createdAt, 'dd/MM/yyyy') : '---'}">
                            12/04/2026
                        </span>
                    </div>
                    
                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{/subjects/{id}(id=${subject.subjectId})}"
                           class="btn btn-outline-primary flex-fill rounded-pill">
                            <i class="bi bi-eye me-1"></i> Chi tiết
                        </a>
                        
                        <a th:href="@{/subjects/{id}/topics(id=${subject.subjectId})}"
                           class="btn btn-primary flex-fill rounded-pill">
                            <i class="bi bi-journal-text me-1"></i> Chủ đề
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-4" th:if="${subjects != null and subjects.totalPages > 1}">
        <div th:replace="~{fragments/pagination :: pagination(${subjects})}"></div>
    </div>
</div>
</body>
</html>
