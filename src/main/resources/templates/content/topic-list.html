<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Danh sách Chủ đề (Topics)')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/subjects">Môn học</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${subject.subjectName}">Tên môn học</li>
        </ol>
    </nav>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Các chủ đề thuộc: <span class="text-primary fw-bold" th:text="${subject.subjectName}">Môn học</span></h2>
        <a th:href="@{/subjects/{id}(id=${subject.subjectId})}" class="btn btn-outline-secondary">&lt; Quay lại</a>
    </div>
    <div class="list-group shadow-sm border-0">
        <a th:href="@{/topics/{id}(id=${topic.topicId})}" class="list-group-item list-group-item-action py-3 mb-2 border rounded" th:each="topic : ${topics}">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1 text-dark fw-bold" th:text="${topic.orderNo + '. ' + topic.topicName}">Topic Name</h5>
            </div>
            <p class="mb-1 text-muted small" th:text="${topic.description}">Mô tả ngắn</p>
        </a>
        <div th:if="${topics.empty}" class="text-center py-4 text-muted">Chưa có bài học nào được tải lên cho môn học này.</div>
    </div>
</div>
</body>
</html>
