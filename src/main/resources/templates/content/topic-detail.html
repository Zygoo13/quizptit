<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout(${topic.topicName}, ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Chi tiết chủ đề</h3>
                    <p class="text-muted mb-0">Thông tin chủ đề và các điều hướng học tập liên quan.</p>
                </div>
                
                <a th:href="@{/subjects/{id}/topics(id=${topic.subject.subjectId})}"
                   class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách chủ đề
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2"
                              th:text="${topic.subject.subjectName}">
                            Subject
                        </span>
                        
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="'Thứ tự ' + ${topic.orderNo}">
                            Thứ tự 1
                        </span>
                    </div>
                    
                    <h2 class="fw-bold mb-3" th:text="${topic.topicName}">Tên chủ đề</h2>
                    
                    <div class="border rounded-4 p-4 bg-light-subtle mb-4">
                        <div class="fw-semibold mb-2">Mô tả chủ đề</div>
                        <div class="text-muted"
                             th:text="${topic.description != null and !#strings.isEmpty(topic.description)} ? ${topic.description} : 'Chưa có mô tả cho chủ đề này.'">
                            Mô tả chủ đề
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="small text-muted mb-1">Mã chủ đề</div>
                                <div class="fw-semibold" th:text="${topic.topicId}">1</div>
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="small text-muted mb-1">Môn học</div>
                                <div class="fw-semibold" th:text="${topic.subject.subjectName}">Subject</div>
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="small text-muted mb-1">Ngày tạo</div>
                                <div class="fw-semibold"
                                     th:text="${topic.createdAt != null ? #temporals.format(topic.createdAt, 'dd/MM/yyyy HH:mm') : '---'}">
                                    12/04/2026 10:00
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex flex-wrap gap-2">
                        <a th:href="@{/quizzes}"
                           class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-journal-check me-1"></i> Xem quiz
                        </a>
                        
                        <a th:href="@{/community/questions(topicId=${topic.topicId})}"
                           class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-chat-dots me-1"></i> Xem thảo luận
                        </a>
                        
                        <a th:href="@{/progress/topic/{id}(id=${topic.topicId})}"
                           class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-graph-up me-1"></i> Tiến độ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
