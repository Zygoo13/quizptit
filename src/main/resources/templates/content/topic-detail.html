<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Chủ đề</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/subjects">Môn học</a></li>
            <li class="breadcrumb-item"><a th:href="@{/subjects/{id}(id=${topic.subject.subjectId})}" th:text="${topic.subject.subjectName}">Môn học</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${topic.topicName}">Tên topic</li>
        </ol>
    </nav>
    <div class="card shadow-sm border-0 border-start border-4 border-primary">
        <div class="card-body py-4">
            <h2 class="card-title text-primary fw-bold mb-2" th:text="${topic.topicName}">Topic</h2>
            <h6 class="card-subtitle mb-3 text-muted small" th:text="'Thứ tự bài học: ' + ${topic.orderNo}">Thứ tự</h6>
            <p class="card-text mt-3" style="white-space: pre-line;" th:text="${topic.description}">Mô tả chi tiết</p>
            <div class="mt-4">
                <button class="btn btn-outline-success">Luyện tập trắc nghiệm (Comming Soon)</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
