<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Đáp án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 pb-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/questions">Câu hỏi</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/questions/{id}(id=${question.questionId})}">Chi tiết</a></li>
            <li class="breadcrumb-item active" aria-current="page">Quản lý đáp án</li>
        </ol>
    </nav>

    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>

    <div class="p-3 bg-light rounded mb-5 border-start border-4 border-primary">
        <h6 class="text-uppercase text-secondary fw-bold small mb-2">Đang chỉnh sửa đáp án cho câu hỏi:</h6>
        <p class="fs-5 mb-0" th:text="${question.content}"></p>
    </div>

    <div class="row">
        <!-- Danh sách -->
        <div class="col-md-7">
            <h4 class="mb-4 fw-bold">Danh sách các đáp án</h4>
            <div class="list-group mb-4 shadow-sm border-0">
                <div th:each="opt : ${options}" class="list-group-item mb-2 border rounded p-3" th:classappend="${opt.isCorrect} ? 'bg-success-subtle border-success' : ''">
                    <form th:action="@{/admin/questions/{qid}/options/{oid}/edit(qid=${question.questionId}, oid=${opt.optionId})}" method="post" class="row g-2 align-items-center">
                        <div class="col-2">
                            <label class="x-small text-muted mb-1 d-block">Nhãn</label>
                            <input type="text" name="optionLabel" class="form-control fw-bold text-center" th:value="${opt.optionLabel}" required>
                        </div>
                        <div class="col-6">
                            <label class="x-small text-muted mb-1 d-block">Nội dung đáp án</label>
                            <input type="text" name="content" class="form-control" th:value="${opt.content}" required>
                        </div>
                        <div class="col-2 text-center">
                            <label class="x-small text-muted mb-1 d-block">Đúng?</label>
                            <input type="checkbox" name="isCorrect" class="form-check-input" th:checked="${opt.isCorrect}">
                        </div>
                        <div class="col-2 d-flex flex-column gap-1">
                            <button type="submit" class="btn btn-sm btn-primary">Lưu</button>
                            <button type="submit" th:formaction="@{/admin/questions/{qid}/options/{oid}/delete(qid=${question.questionId}, oid=${opt.optionId})}" class="btn btn-sm btn-outline-danger">Xoá</button>
                        </div>
                    </form>
                </div>
                <div th:if="${options.empty}" class="text-center py-5 bg-white border rounded">
                    <p class="text-muted mb-0">Chưa có bất kỳ đáp án nào cho câu hỏi này.</p>
                </div>
            </div>
        </div>

        <!-- Form thêm mới -->
        <div class="col-md-5">
            <div class="card shadow-sm border-0 bg-primary text-white">
                <div class="card-header fw-bold bg-transparent border-white border-opacity-10 py-3">Thêm Đáp án mới</div>
                <div class="card-body p-4 bg-white text-dark rounded-bottom">
                    <form th:action="@{/admin/questions/{id}/options/create(id=${question.questionId})}" th:object="${newOption}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nhãn (A, B, C...)</label>
                            <input type="text" class="form-control" th:field="*{optionLabel}" required maxlength="10">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nội dung chi tiết</label>
                            <textarea class="form-control" th:field="*{content}" required rows="3" maxlength="500"></textarea>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input border-primary" th:field="*{isCorrect}" id="correctCheck">
                            <label class="form-check-label fw-bold text-success" for="correctCheck">Đánh dấu là đáp án ĐÚNG</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 border-0 shadow">Thêm vào câu hỏi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
