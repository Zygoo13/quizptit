<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Tạo câu hỏi', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Tạo câu hỏi</h3>
                    <p class="text-muted mb-0">Tạo mới câu hỏi và cấu hình đáp án đúng cho ngân hàng đề.</p>
                </div>
                
                <a th:href="@{/admin/questions}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="@{/admin/questions/create}" th:object="${question}" method="post">
                        <div class="row g-4">
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Môn học</label>
                                <select id="subjectSelect" class="form-select">
                                    <option value="">-- Chọn môn học --</option>
                                    <option th:each="subject : ${subjects}"
                                            th:value="${subject.subjectId}"
                                            th:text="${subject.subjectName}"
                                            th:selected="${question.topic != null and question.topic.subject != null and question.topic.subject.subjectId == subject.subjectId}">
                                        Subject
                                    </option>
                                </select>
                            </div>
                            
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Chủ đề</label>
                                <select th:field="*{topic.topicId}" id="topicSelect" class="form-select" required>
                                    <option value="">-- Chọn chủ đề --</option>
                                    <option th:each="topic : ${topics}"
                                            th:value="${topic.topicId}"
                                            th:text="${topic.topicName}">
                                        Topic
                                    </option>
                                </select>
                            </div>
                            
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Độ khó</label>
                                <select th:field="*{difficultyLevel}" class="form-select" required>
                                    <option value="">-- Chọn độ khó --</option>
                                    <option th:each="difficulty : ${difficultyLevels}"
                                            th:value="${difficulty}"
                                            th:text="${difficulty}">
                                        EASY
                                    </option>
                                </select>
                            </div>
                            
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Trạng thái</label>
                                <select th:field="*{status}" class="form-select" required>
                                    <option value="">-- Chọn trạng thái --</option>
                                    <option th:each="statusItem : ${questionStatuses}"
                                            th:value="${statusItem}"
                                            th:text="${statusItem}">
                                        DRAFT
                                    </option>
                                </select>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label fw-semibold">Nội dung câu hỏi</label>
                                <textarea th:field="*{content}"
                                          class="form-control"
                                          rows="4"
                                          placeholder="Nhập nội dung câu hỏi..."
                                          required></textarea>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label fw-semibold">Giải thích</label>
                                <textarea th:field="*{explanation}"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Giải thích đáp án đúng (không bắt buộc)"></textarea>
                            </div>
                            
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <label class="form-label fw-semibold mb-0">Danh sách đáp án</label>
                                    <span class="text-muted small">Chọn đúng 1 đáp án đúng</span>
                                </div>
                                
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="option, stat : *{options}" class="border rounded-4 p-3 bg-light-subtle">
                                        <div class="row g-3 align-items-center">
                                            <div class="col-lg-1 col-md-2">
                                                <label class="form-label fw-semibold mb-1">Nhãn</label>
                                                <input type="text"
                                                       th:field="*{options[__${stat.index}__].optionLabel}"
                                                       class="form-control"
                                                       readonly>
                                            </div>
                                            
                                            <div class="col-lg-9 col-md-8">
                                                <label class="form-label fw-semibold mb-1">Nội dung đáp án</label>
                                                <input type="text"
                                                       th:field="*{options[__${stat.index}__].content}"
                                                       class="form-control"
                                                       placeholder="Nhập nội dung đáp án"
                                                       required>
                                            </div>
                                            
                                            <div class="col-lg-2 col-md-2">
                                                <label class="form-label fw-semibold mb-1 d-block">Đáp án đúng</label>
                                                <div class="form-check mt-2">
                                                    <input class="form-check-input"
                                                           type="radio"
                                                           name="correctOptionIndex"
                                                           th:value="${stat.index}"
                                                           th:checked="${option.isCorrect}">
                                                    <label class="form-check-label">Chọn</label>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <input type="hidden" th:field="*{options[__${stat.index}__].optionId}">
                                        <input type="hidden" th:field="*{options[__${stat.index}__].isCorrect}">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-plus-circle me-1"></i> Tạo câu hỏi
                            </button>
                            <a th:href="@{/admin/questions}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const subjectSelect = document.getElementById('subjectSelect');
        const topicSelect = document.getElementById('topicSelect');

        async function loadTopicsBySubject(subjectId, selectedTopicId = '') {
            if (!subjectId) {
                topicSelect.innerHTML = '<option value="">-- Chọn chủ đề --</option>';
                return;
            }

            try {
                const response = await fetch(`/api/quiz-data/topics?subjectId=${subjectId}`);
                const topics = await response.json();

                let options = '<option value="">-- Chọn chủ đề --</option>';
                topics.forEach(topic => {
                    const selected = String(topic.topicId) === String(selectedTopicId) ? 'selected' : '';
                    options += `<option value="${topic.topicId}" ${selected}>${topic.topicName}</option>`;
                });

                topicSelect.innerHTML = options;
            } catch (e) {
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const currentTopicId = topicSelect.value;
            const initialSubjectId = subjectSelect.value;
            if (initialSubjectId) {
                await loadTopicsBySubject(initialSubjectId, currentTopicId);
            }
        });

        subjectSelect?.addEventListener('change', async function () {
            await loadTopicsBySubject(this.value, '');
        });
    </script>
</div>
</body>
</html>
