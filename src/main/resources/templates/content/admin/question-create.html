<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/questions">Câu hỏi</a></li>
            <li class="breadcrumb-item active" aria-current="page">Tạo mới</li>
        </ol>
    </nav>
    <h2 class="mb-4">Tạo mới Câu hỏi</h2>
    
    <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>

    <div class="card shadow-sm border-0 border-top border-4 border-success">
        <div class="card-body p-4">
            <form id="createForm" th:action="@{/admin/questions/create}" th:object="${question}" method="post">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Môn học (*)</label>
                        <select id="subjectFilter" class="form-select form-control-lg border-primary-subtle shadow-sm" onchange="filterTopics()" required>
                            <option value="">-- Chọn một môn học --</option>
                            <option th:each="s : ${subjects}" th:value="${s.subjectId}" th:text="${s.subjectName}" th:selected="${question.topic != null and question.topic.subject != null and question.topic.subject.subjectId == s.subjectId}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Chủ đề bài học (Topic) (*)</label>
                        <select id="topicFilter" class="form-select form-control-lg border-primary-subtle shadow-sm" th:field="*{topic.topicId}" required>
                            <option value="">-- Chọn một chủ đề --</option>
                            <option th:each="t : ${topics}" th:value="${t.topicId}" th:text="${t.topicName}" th:data-subject-id="${t.subject.subjectId}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Nội dung câu hỏi (*)</label>
                    <textarea class="form-control" th:field="*{content}" required rows="5" placeholder="Nhập câu hỏi..."></textarea>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Độ khó (*)</label>
                        <select class="form-select" th:field="*{difficultyLevel}" required>
                            <option th:each="d : ${difficultyLevels}" th:value="${d}" th:text="${d}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Trạng thái (*)</label>
                        <select class="form-select" th:field="*{status}" required>
                            <option th:each="s : ${questionStatuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>
                </div>
                <h4 class="mt-4 mb-3 fs-5 fw-bold text-secondary border-bottom pb-2">Các đáp án</h4>
                <div class="row">
                    <div class="col-md-6 mb-3" th:each="option, stat : *{options}">
                        <div class="card bg-light border-0 shadow-sm">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label fw-bold mb-0 text-primary">
                                        Đáp án <span th:text="${option.optionLabel}">A</span>
                                    </label>
                                    <div class="form-check form-switch cursor-pointer">
                                        <input class="form-check-input correct-option-radio" type="radio" name="correctOptionIndex" th:value="${stat.index}" th:id="'radio-' + ${stat.index}">
                                        <label class="form-check-label text-success fw-bold" th:for="'radio-' + ${stat.index}">Đúng</label>
                                    </div>
                                </div>
                                <input type="hidden" th:field="*{options[__${stat.index}__].optionLabel}" />
                                <textarea class="form-control border-0 shadow-sm" th:field="*{options[__${stat.index}__].content}" rows="2" required placeholder="Nhập nội dung đáp án..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-4 mt-3">
                    <label class="form-label fw-bold small text-muted">Giải thích cho đáp án (Không bắt buộc)</label>
                    <textarea class="form-control" th:field="*{explanation}" rows="3" placeholder="Ghi chú vì sao đáp án này đúng..."></textarea>
                </div>
                
                <div class="pt-3 border-top d-flex gap-2">
                    <button type="submit" class="btn btn-success fw-bold px-5">Lưu câu hỏi</button>
                    <a href="/admin/questions" class="btn btn-outline-secondary px-4">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function filterTopics() {
        const subjectId = document.getElementById('subjectFilter').value;
        const topicSelect = document.getElementById('topicFilter');
        const options = topicSelect.options;
        for (let i = 1; i < options.length; i++) {
            const rowTopicSubj = options[i].getAttribute('data-subject-id');
            if (!subjectId || subjectId === rowTopicSubj) {
                options[i].hidden = false;
            } else {
                options[i].hidden = true;
            }
        }
        if (topicSelect.selectedIndex > 0 && options[topicSelect.selectedIndex].hidden) {
            topicSelect.selectedIndex = 0;
        }
    }
    document.addEventListener('DOMContentLoaded', filterTopics);

    // Toggle radio button functionality
    let previousRadio = null;
    document.querySelectorAll('.correct-option-radio').forEach(radio => {
        if(radio.checked) previousRadio = radio;
        radio.addEventListener('click', function(e) {
            if (previousRadio === this) {
                this.checked = false;
                previousRadio = null;
            } else {
                previousRadio = this;
            }
        });
    });

    // Validate on submit
    document.getElementById('createForm').addEventListener('submit', function(e) {
        let checked = document.querySelector('.correct-option-radio:checked');
        if (!checked) {
            e.preventDefault();
            alert('Cảnh báo: Bạn chưa chọn đáp án ĐÚNG nào cả! Vui lòng tích chọn ít nhất 1 đáp án làm đáp án đúng.');
        }
    });
</script>
</body>
</html>
