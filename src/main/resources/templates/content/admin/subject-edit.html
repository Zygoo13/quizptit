<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa Môn học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/subjects">Môn học</a></li>
            <li class="breadcrumb-item active" aria-current="page">Chỉnh sửa</li>
        </ol>
    </nav>
    <h2 class="mb-4">Chỉnh sửa Môn học</h2>
    
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card shadow-sm border-0 border-top border-4 border-warning">
        <div class="card-body py-4">
            <form th:action="@{/admin/subjects/{id}/edit(id=${subject.subjectId})}" th:object="${subject}" method="post">
                <input type="hidden" th:field="*{subjectId}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Tên môn học (*)</label>
                    <input type="text" class="form-control form-control-lg" th:field="*{subjectName}" required maxlength="150">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Mô tả chi tiết</label>
                    <textarea class="form-control" th:field="*{description}" rows="4" maxlength="500"></textarea>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{isActive}">
                    <label class="form-check-label text-secondary">Đang trong trạng thái hoạt động</label>
                </div>
                
                <div class="pt-3 border-top d-flex gap-2">
                    <button type="submit" class="btn btn-warning px-4 fw-bold">Cập nhật thông tin</button>
                    <a href="/admin/subjects" class="btn btn-outline-secondary px-4">Hủy thao tác</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
