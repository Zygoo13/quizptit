<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Cập nhật môn học', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Cập nhật môn học</h3>
                    <p class="text-muted mb-0">Chỉnh sửa thông tin và trạng thái hiển thị của môn học.</p>
                </div>
                
                <a th:href="@{/admin/subjects}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="@{/admin/subjects/{id}/edit(id=${subject.subjectId})}"
                          th:object="${subject}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên môn học</label>
                            <input type="text" th:field="*{subjectName}" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>
                        
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActive">
                            <label class="form-check-label fw-semibold" for="isActive">
                                Hiển thị môn học
                            </label>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save me-1"></i> Lưu thay đổi
                            </button>
                            <a th:href="@{/admin/subjects}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
