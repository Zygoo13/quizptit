<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Tạo môn học', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Tạo môn học</h3>
                    <p class="text-muted mb-0">Thêm môn học mới vào hệ thống học liệu.</p>
                </div>
                
                <a th:href="@{/admin/subjects}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="@{/admin/subjects/create}" th:object="${subject}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên môn học</label>
                            <input type="text"
                                   th:field="*{subjectName}"
                                   class="form-control"
                                   placeholder="Ví dụ: Lập trình Web"
                                   required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Mô tả ngắn về môn học"></textarea>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-plus-circle me-1"></i> Tạo môn học
                            </button>
                            <a th:href="@{/admin/subjects}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
