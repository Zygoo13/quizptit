<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Ngân hàng Câu hỏi (Admin)</h2>
        <a href="/admin/questions/create" class="btn btn-success fw-bold">+ Tạo mới câu hỏi</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>

    <form class="mb-4 row g-2 bg-light p-3 rounded" action="/admin/questions" method="get">
        <div class="col-md-3">
            <select name="topicId" class="form-select shadow-sm">
                <option value="">-- Mọi Topic --</option>
                <option th:each="t : ${topics}" th:value="${t.topicId}" th:text="${t.topicName}" th:selected="${t.topicId == topicId}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="status" class="form-select shadow-sm">
                <option value="">-- Trạng thái --</option>
                <option value="DRAFT" th:selected="${status?.name() == 'DRAFT'}">DRAFT (Nháp)</option>
                <option value="APPROVED" th:selected="${status?.name() == 'APPROVED'}">APPROVED (Duyệt)</option>
                <option value="HIDDEN" th:selected="${status?.name() == 'HIDDEN'}">HIDDEN (Ẩn)</option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="difficulty" class="form-select shadow-sm">
                <option value="">-- Độ khó --</option>
                <option value="EASY" th:selected="${difficulty?.name() == 'EASY'}">DỄ</option>
                <option value="MEDIUM" th:selected="${difficulty?.name() == 'MEDIUM'}">TRUNG BÌNH</option>
                <option value="HARD" th:selected="${difficulty?.name() == 'HARD'}">KHÓ</option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="text" name="keyword" class="form-control shadow-sm" placeholder="Tìm nội dung câu hỏi..." th:value="${keyword}">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100 fw-bold shadow-sm" type="submit">Tìm</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-hover border shadow-sm rounded">
            <thead class="table-light text-secondary small text-uppercase">
                <tr>
                    <th>ID</th>
                    <th>Chủ đề</th>
                    <th>Nội dung</th>
                    <th>Độ khó</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="question : ${questions.content}">
                    <td th:text="${question.questionId}">ID</td>
                    <td class="small" th:text="${question.topic.topicName}">Topic</td>
                    <td class="text-dark py-3" th:text="${#strings.abbreviate(question.content, 60)}">Content</td>
                    <td>
                        <span class="badge" th:classappend="${question.difficultyLevel.name() == 'EASY' ? 'bg-info' : (question.difficultyLevel.name() == 'MEDIUM' ? 'bg-primary' : 'bg-danger')}" th:text="${question.difficultyLevel}">Difficulty</span>
                    </td>
                    <td>
                        <span class="badge rounded-pill border" th:classappend="${question.status.name() == 'APPROVED' ? 'bg-success-subtle text-success border-success' : 'bg-light text-dark'}" th:text="${question.status}">Status</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/admin/questions/{id}(id=${question.questionId})}" class="btn btn-info btn-sm text-white fw-bold">Đáp án</a>
                            <a th:href="@{/admin/questions/{id}/edit(id=${question.questionId})}" class="btn btn-warning btn-sm">Sửa</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${questions.empty}">
                    <td colspan="6" class="text-center py-5 text-muted small">Ngân hàng câu hỏi hiện chưa có nội dung.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
