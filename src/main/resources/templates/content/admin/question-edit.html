<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa Câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/questions">Câu hỏi</a></li>
            <li class="breadcrumb-item active" aria-current="page">Chỉnh sửa</li>
        </ol>
    </nav>
    <h2 class="mb-4">Chỉnh sửa Câu hỏi ID: [[${question.questionId}]]</h2>
    
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card shadow-sm border-0 border-top border-4 border-warning">
        <div class="card-body p-4">
            <form th:action="@{/admin/questions/{id}/edit(id=${question.questionId})}" th:object="${question}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-bold">Thuộc Chủ đề</label>
                    <select class="form-select shadow-sm" th:field="*{topic.topicId}" required>
                        <option th:each="t : ${topics}" th:value="${t.topicId}" th:text="${t.topicName}"></option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Nội dung câu hỏi</label>
                    <textarea class="form-control" th:field="*{content}" required rows="5"></textarea>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold font-monospace small">Độ khó</label>
                        <select class="form-select" th:field="*{difficultyLevel}" required>
                            <option th:each="d : ${difficultyLevels}" th:value="${d}" th:text="${d}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold font-monospace small">Trạng thái</label>
                        <select class="form-select" th:field="*{status}" required>
                            <option th:each="s : ${questionStatuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small">Giải thích chi tiết</label>
                    <textarea class="form-control" th:field="*{explanation}" rows="4"></textarea>
                </div>
                
                <div class="pt-3 border-top d-flex gap-2">
                    <button type="submit" class="btn btn-warning fw-bold px-5">Cập nhật ngay</button>
                    <a href="/admin/questions" class="btn btn-outline-secondary px-4">Đóng</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
