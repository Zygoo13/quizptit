<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Chủ đề</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/topics">Chủ đề</a></li>
            <li class="breadcrumb-item active" aria-current="page">Tạo mới</li>
        </ol>
    </nav>
    <h2 class="mb-4">Thêm mới Chủ đề (Topic)</h2>
    
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card shadow-sm border-0 border-top border-4 border-success">
        <div class="card-body py-4">
            <form th:action="@{/admin/topics/create}" th:object="${topic}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn Môn học (*)</label>
                    <select class="form-select form-control-lg" th:field="*{subject.subjectId}" required shadow-sm>
                        <option value="">-- Môn học --</option>
                        <option th:each="s : ${subjects}" th:value="${s.subjectId}" th:text="${s.subjectName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tên Topic (*)</label>
                    <input type="text" class="form-control" th:field="*{topicName}" required maxlength="150" placeholder="VD: Khai báo biến, OOP căn bản...">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Thứ tự hiển thị bài học (*)</label>
                    <input type="number" class="form-control w-25" th:field="*{orderNo}" required min="1">
                    <div class="form-text">Dùng để sắp xếp các bài trong một môn học theo đúng lộ trình.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nội dung tóm tắt</label>
                    <textarea class="form-control" th:field="*{description}" rows="3" maxlength="500"></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{isActive}">
                    <label class="form-check-label">Cho phép hiển thị bài học này</label>
                </div>
                
                <div class="mt-4 pt-3 border-top d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4 fw-bold">Lưu bài học</button>
                    <a href="/admin/topics" class="btn btn-outline-secondary">Trở lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
