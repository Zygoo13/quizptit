<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Cập nhật chủ đề', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Cập nhật chủ đề</h3>
                    <p class="text-muted mb-0">Chỉnh sửa thông tin, thứ tự và trạng thái hiển thị của chủ đề.</p>
                </div>
                
                <a th:href="@{/admin/topics}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="@{/admin/topics/{id}/edit(id=${topic.topicId})}"
                          th:object="${topic}"
                          method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Môn học</label>
                            <select th:field="*{subject.subjectId}" class="form-select" required>
                                <option th:each="subject : ${subjects}"
                                        th:value="${subject.subjectId}"
                                        th:text="${subject.subjectName}">
                                    Subject
                                </option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên chủ đề</label>
                            <input type="text" th:field="*{topicName}" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Thứ tự</label>
                            <input type="number" th:field="*{orderNo}" class="form-control" min="1" required>
                        </div>
                        
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActive">
                            <label class="form-check-label fw-semibold" for="isActive">
                                Hiển thị chủ đề
                            </label>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save me-1"></i> Lưu thay đổi
                            </button>
                            <a th:href="@{/admin/topics}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
