<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Quản lý chủ đề', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý chủ đề</h3>
            <p class="text-muted mb-0">Quản lý danh sách chủ đề theo môn học, thứ tự và trạng thái hiển thị.</p>
        </div>
        
        <a th:href="@{/admin/topics/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Tạo chủ đề
        </a>
    </div>
    
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form th:action="@{/admin/topics}" method="get" class="row g-3 align-items-end">
                <div class="col-lg-4">
                    <label class="form-label fw-semibold">Môn học</label>
                    <select name="subjectId" class="form-select">
                        <option value="">Tất cả môn học</option>
                        <option th:each="subject : ${subjects}"
                                th:value="${subject.subjectId}"
                                th:text="${subject.subjectName}"
                                th:selected="${subjectId == subject.subjectId}">
                            Subject
                        </option>
                    </select>
                </div>
                
                <div class="col-lg-4">
                    <label class="form-label fw-semibold">Từ khóa</label>
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           th:value="${keyword}"
                           placeholder="Tìm theo tên chủ đề">
                </div>
                
                <div class="col-lg-2">
                    <label class="form-label fw-semibold">Trạng thái</label>
                    <select name="isActive" class="form-select">
                        <option th:selected="${isActive == null}" value="">Tất cả</option>
                        <option th:selected="${isActive == true}" value="true">Đang hiển thị</option>
                        <option th:selected="${isActive == false}" value="false">Đang ẩn</option>
                    </select>
                </div>
                
                <div class="col-lg-2 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel me-1"></i> Lọc
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Chủ đề</th>
                        <th>Môn học</th>
                        <th>Thứ tự</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${topics == null or #lists.isEmpty(topics.content)}">
                        <td colspan="6" class="text-center py-5 text-muted">Không có chủ đề nào phù hợp.</td>
                    </tr>
                    
                    <tr th:each="topic : ${topics.content}">
                        <td class="ps-4 fw-bold text-primary" th:text="${topic.topicId}">1</td>
                        
                        <td>
                            <div class="fw-semibold text-dark" th:text="${topic.topicName}">Topic name</div>
                            <div class="small text-muted"
                                 style="max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                                 th:text="${topic.description != null and !#strings.isEmpty(topic.description)} ? ${topic.description} : 'Không có mô tả'">
                                Description
                            </div>
                        </td>
                        
                        <td>
                            <span th:text="${topic.subject.subjectName}">Subject</span>
                        </td>
                        
                        <td>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${topic.orderNo}">1</span>
                        </td>
                        
                        <td>
                        <span th:if="${topic.isActive}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-check-circle-fill me-1"></i> Đang hiển thị
                        </span>
                            <span th:unless="${topic.isActive}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-eye-slash-fill me-1"></i> Đang ẩn
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <div class="d-inline-flex gap-2">
                                <a th:href="@{/admin/topics/{id}/edit(id=${topic.topicId})}"
                                   class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                    <i class="bi bi-pencil-square me-1"></i> Sửa
                                </a>
                                
                                <form th:action="@{/admin/topics/{id}/toggle-status(id=${topic.topicId})}"
                                      method="post"
                                      class="d-inline">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                                        <i class="bi bi-arrow-repeat me-1"></i>
                                        <span th:text="${topic.isActive} ? 'Ẩn' : 'Hiện'">Ẩn</span>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="card-body pt-3" th:if="${topics != null and topics.totalPages > 1}">
            <div th:replace="~{fragments/pagination :: pagination(${topics})}"></div>
        </div>
    </div>
</div>
</body>
</html>
