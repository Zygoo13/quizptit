<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Topic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="/admin" class="btn btn-outline-secondary">&lt; Quay lại</a>
            <h2 class="mb-0">Quản lý Chủ đề / Bài học (Admin)</h2>
        </div>
        <a href="/admin/topics/create" class="btn btn-success fw-bold">+ Tạo mới Chủ đề</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>

    <form class="mb-4 row g-3 bg-light p-3 rounded" action="/admin/topics" method="get">
        <div class="col-md-4">
            <select name="subjectId" class="form-select">
                <option value="">-- Môn học --</option>
                <option th:each="s : ${subjects}" th:value="${s.subjectId}" th:text="${s.subjectName}" th:selected="${s.subjectId == subjectId}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="text" name="keyword" class="form-control" placeholder="Tìm kiếm tên topic..." th:value="${keyword}">
        </div>
        <div class="col-md-2">
            <select name="isActive" class="form-select">
                <option value="">-- Trạng thái --</option>
                <option value="true" th:selected="${isActive == true}">Hiển thị</option>
                <option value="false" th:selected="${isActive == false}">Ẩn</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100 fw-bold" type="submit">Lọc</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-hover border shadow-sm rounded">
            <thead class="table-light text-secondary small text-uppercase">
                <tr>
                    <th>ID</th>
                    <th>Môn học</th>
                    <th>Tên Topic</th>
                    <th>Thứ tự</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="topic : ${topics.content}">
                    <td th:text="${topic.topicId}">ID</td>
                    <td class="small text-muted" th:text="${topic.subject.subjectName}">Subject</td>
                    <td class="fw-bold text-dark" th:text="${topic.topicName}">Name</td>
                    <td class="text-center" th:text="${topic.orderNo}">Order</td>
                    <td>
                        <span th:if="${topic.isActive}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${topic.isActive}" class="badge bg-secondary">Đã ẩn</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/admin/topics/{id}/edit(id=${topic.topicId})}" class="btn btn-warning btn-sm">Sửa</a>
                            <form th:action="@{/admin/topics/{id}/toggle-status(id=${topic.topicId})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-info" th:text="${topic.isActive} ? 'Ẩn' : 'Bật'"></button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${topics.empty}">
                    <td colspan="6" class="text-center py-4 text-muted">Không tìm thấy chủ đề nào phù hợp.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const backBtn = document.querySelector('a.btn-outline-secondary');
        if (backBtn && backBtn.textContent.includes('Quay lại')) {
            if (document.referrer.includes('subject')) {
                backBtn.href = '/';
            } else {
                backBtn.href = '/admin';
            }
        }
    });
</script>
</body>
</html>
