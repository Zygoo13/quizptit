<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout(${subject.subjectName}, ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Chi tiết môn học</h3>
                    <p class="text-muted mb-0">Thông tin tổng quan của môn học và điều hướng tới các chủ đề.</p>
                </div>
                
                <a th:href="@{/subjects}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2">
                            Môn học
                        </span>
                        
                        <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2"
                              th:if="${subject.isActive}">
                            Đang hiển thị
                        </span>
                    </div>
                    
                    <h2 class="fw-bold mb-3" th:text="${subject.subjectName}">Tên môn học</h2>
                    
                    <div class="border rounded-4 p-4 bg-light-subtle mb-4">
                        <div class="fw-semibold mb-2">Mô tả</div>
                        <div class="text-muted"
                             th:text="${subject.description != null and !#strings.isEmpty(subject.description)} ? ${subject.description} : 'Chưa có mô tả cho môn học này.'">
                            Mô tả môn học
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="small text-muted mb-1">Mã môn học</div>
                                <div class="fw-semibold" th:text="${subject.subjectId}">1</div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="small text-muted mb-1">Ngày tạo</div>
                                <div class="fw-semibold"
                                     th:text="${subject.createdAt != null ? #temporals.format(subject.createdAt, 'dd/MM/yyyy HH:mm') : '---'}">
                                    12/04/2026 10:00
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex flex-wrap gap-2">
                        <a th:href="@{/subjects/{id}/topics(id=${subject.subjectId})}"
                           class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-journal-text me-1"></i> Xem các chủ đề
                        </a>
                        
                        <a th:href="@{/quizzes(subjectId=${subject.subjectId})}"
                           class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-journal-check me-1"></i> Xem quiz theo môn
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
