<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Chi tiết môn học')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/subjects">Môn học</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${subject.subjectName}">Tên môn học</li>
        </ol>
    </nav>
    <div class="card shadow-sm mb-4 border-0">
        <div class="card-body">
            <h2 class="card-title text-primary fw-bold mb-3" th:text="${subject.subjectName}">Môn học</h2>
            <p class="card-text text-secondary" style="white-space: pre-line;" th:text="${subject.description}">Mô tả chi tiết</p>
            <div class="mt-4">
                <a th:href="@{/subjects/{id}/topics(id=${subject.subjectId})}" class="btn btn-primary btn-lg px-4">Khám phá các bài học (Topics)</a>
                <a th:href="@{/subjects}" class="btn btn-outline-secondary btn-lg px-4 ms-2">Quay lại danh sách</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
