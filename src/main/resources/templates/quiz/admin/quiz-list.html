<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Quản lý quiz', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .quiz-title-cell {
            max-width: 320px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý quiz</h3>
            <p class="text-muted mb-0">
                Quản lý các đề thi thủ công, trạng thái công khai và chỉnh sửa nội dung đề.
            </p>
        </div>
        
        <a th:href="@{/admin/quizzes/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Tạo quiz
        </a>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Tiêu đề</th>
                        <th>Môn học</th>
                        <th>Chủ đề</th>
                        <th>Loại</th>
                        <th>Thời lượng</th>
                        <th>Số câu</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(quizzes)}">
                        <td colspan="9" class="text-center py-5 text-muted">
                            Chưa có quiz nào trong hệ thống.
                        </td>
                    </tr>
                    
                    <tr th:each="quiz : ${quizzes}">
                        <td class="ps-4 fw-bold text-primary" th:text="${quiz.quizId}">1</td>
                        
                        <td>
                            <div class="fw-semibold text-dark quiz-title-cell"
                                 th:text="${quiz.title}"
                                 th:title="${quiz.title}">
                                Tên quiz
                            </div>
                            <div class="small text-muted"
                                 th:text="${#temporals.format(quiz.createdAt, 'dd/MM/yyyy HH:mm')}">
                                12/04/2026 10:00
                            </div>
                        </td>
                        
                        <td th:text="${quiz.subject != null ? quiz.subject.subjectName : 'N/A'}">Môn học</td>
                        
                        <td>
                            <span th:text="${quiz.topic != null ? quiz.topic.topicName : '---'}">Topic</span>
                        </td>
                        
                        <td>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${quiz.quizType}">
                            MANUAL
                        </span>
                        </td>
                        
                        <td>
                            <span th:text="${quiz.durationMinutes} + ' phút'">45 phút</span>
                        </td>
                        
                        <td>
                        <span class="badge bg-info-subtle text-info border border-info-subtle rounded-pill px-3 py-2"
                              th:text="${quiz.totalQuestions}">
                            20
                        </span>
                        </td>
                        
                        <td>
                        <span th:if="${quiz.isPublished}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-check-circle-fill me-1"></i> Published
                        </span>
                            <span th:unless="${quiz.isPublished}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-eye-slash-fill me-1"></i> Draft
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <div class="d-inline-flex gap-2">
                                <a th:href="@{/admin/quizzes/{id}/edit(id=${quiz.quizId})}"
                                   class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                    <i class="bi bi-pencil-square me-1"></i> Sửa
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
