<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout(pageTitle='Quản Lý Kỳ Thi', content=~{::content})}">
<head>
</head>
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="m-0 fw-bold text-primary">
            <i class="bi bi-journal-check me-2"></i>Danh sách Đề Thi / Kỳ Thi
        </h5>
        <div>
            <!-- Bạn có thể thêm nút tạo Random nếu đã có giao diện -->
            <!-- <a class="btn btn-outline-primary shadow-sm me-2" th:href="@{/admin/quizzes/create-random}">
                <i class="bi bi-shuffle me-1"></i>Tạo Ngẫu Nhiên
            </a> -->
            <a class="btn btn-primary shadow-sm" th:href="@{/admin/quizzes/create}">
                <i class="bi bi-plus-circle me-1"></i>Tạo Đề Thi Thủ Công
            </a>
        </div>
    </div>

    <!-- Bảng danh sách Quiz -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Tiêu Đề</th>
                            <th>Môn Học</th>
                            <th class="text-center">Loại Đề</th>
                            <th class="text-center">Câu Hỏi</th>
                            <th class="text-center">Thời Gian</th>
                            <th class="text-center">Trạng Thái</th>
                            <th class="text-center">Người Tạo</th>
                            <th class="text-end pe-4">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(quizzes)}">
                            <td colspan="9" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                Chưa có đề thi nào trong hệ thống
                            </td>
                        </tr>
                        
                        <tr th:each="quiz : ${quizzes}">
                            <td class="ps-4 fw-bold text-secondary" th:text="${quiz.quizId}">1</td>
                            <td class="fw-semibold">
                                <span th:text="${quiz.title}">Đề thi thử</span>
                                <div th:if="${quiz.topic != null}" class="small text-muted mt-1">
                                    <i class="bi bi-tag-fill me-1"></i><span th:text="${quiz.topic.topicName}">Chủ đề</span>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-info text-dark bg-opacity-10 border border-info" 
                                      th:if="${quiz.subject != null}" 
                                      th:text="${quiz.subject.subjectName}">Toán</span>
                            </td>
                            <td class="text-center">
                                <span th:if="${quiz.quizType.name() == 'MANUAL'}" class="badge bg-primary text-white">Thủ công</span>
                                <span th:if="${quiz.quizType.name() == 'RANDOM'}" class="badge bg-warning text-dark">Ngẫu nhiên</span>
                            </td>
                            <td class="text-center fw-bold" th:text="${quiz.totalQuestions}">50</td>
                            <td class="text-center">
                                <span th:text="${quiz.durationMinutes}">45</span> phút
                            </td>
                            <td class="text-center">
                                <span th:if="${quiz.isPublished}" class="badge bg-success bg-opacity-75"><i class="bi bi-check-circle me-1"></i>Đã Xuất Bản</span>
                                <span th:unless="${quiz.isPublished}" class="badge bg-secondary bg-opacity-50 text-dark"><i class="bi bi-lock me-1"></i>Bản Nháp</span>
                            </td>
                            <td class="text-center small text-muted" th:text="${quiz.createdBy != null ? quiz.createdBy.email : 'N/A'}">
                                admin@ptit.edu.vn
                            </td>
                            <td class="text-end pe-4">
                                <div class="btn-group btn-group-sm">
                                    <button type="button" class="btn btn-outline-secondary" title="Xem chi tiết" disabled>
                                        <i class="bi bi-eye"></i>
                                    </button>
                                    <button type="button" class="btn btn-outline-danger" title="Xóa" disabled>
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Phần phân trang nếu cần về sau -->
            <div class="card-footer bg-white border-top py-3 d-flex justify-content-between align-items-center" th:if="${not #lists.isEmpty(quizzes)}">
                <span class="text-muted small">Hiển thị <strong th:text="${#lists.size(quizzes)}"></strong> kết quả</span>
                <!-- Nơi đặt pagination con trỏ -->
            </div>
        </div>
    </div>
</div>

</body>
</html>
