<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/admin-layout :: layout(pageTitle='Tạo Đề Thi', content=~{::content}, script=~{::script})}">

<head>
</head>

<body>

    <div th:fragment="content">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Tạo Đề Thi Mới</h6>
            </div>
            <div class="card-body">
                <form id="form-tao-de">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Chọn Môn Học:</label>
                        <select class="form-select" id="subjectId" required>
                            <option value="">-- Chọn môn học trước --</option>
                            <option th:each="monHoc : ${subjects}" th:value="${monHoc.subjectId}"
                                th:text="${monHoc.subjectName}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dark">Chọn Chủ Đề:</label>
                        <select class="form-select" id="topicId" required>
                            <option value="">-- Vui lòng chọn môn học trước --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề đề thi:</label>
                        <input type="text" class="form-control" id="title" placeholder="VD: Đề thi giữa kỳ môn Java"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Thời gian làm bài (Phút):</label>
                        <input type="number" class="form-control" id="durationMinutes" placeholder="VD: 45" required
                            min="1">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Tick chọn các câu hỏi đưa vào đề thi:</label>
                        <div class="border p-3 rounded" id="question-container"
                            style="height: 350px; overflow-y: scroll; overflow-x: hidden; background-color: #f8f9fa;">
                            <div class="text-muted text-center py-3">Vui lòng chọn môn học và chủ đề để hiển thị câu
                                hỏi...</div>
                        </div>
                    </div>

                    <button type="submit" id="btn-tao-de" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-plus-circle me-1"></i> Tạo Đề Thi Ngay
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script th:fragment="script">
        document.getElementById('subjectId').addEventListener('change', function () {
            let subjectId = this.value;
            let topicSelect = document.getElementById('topicId');
            let questionContainer = document.getElementById('question-container');

            if (!subjectId) {
                topicSelect.innerHTML = '<option value="">-- Vui lòng chọn môn học trước --</option>';
                questionContainer.innerHTML = '<div class="text-muted text-center py-3">Vui lòng chọn môn học và chủ đề để hiển thị câu hỏi...</div>';
                return;
            }

            fetch(`/api/quiz-data/topics?subjectId=${subjectId}`)
                .then(res => res.json())
                .then(topics => {
                    topicSelect.innerHTML = '<option value="">-- Vui lòng chọn chủ đề --</option>';
                    topics.forEach(t => {
                        topicSelect.innerHTML += `<option value="${t.topicId}">${t.topicName}</option>`;
                    });
                });

            questionContainer.innerHTML = '<div class="text-warning text-center py-3"><i class="bi bi-arrow-up-circle"></i> Vui lòng chọn 1 Chủ đề ở trên để hiển thị câu hỏi...</div>';
        });

        document.getElementById('topicId').addEventListener('change', function () {
            let topicId = this.value;
            let questionContainer = document.getElementById('question-container');

            if (!topicId) {
                questionContainer.innerHTML = '<div class="text-warning text-center py-3"><i class="bi bi-arrow-up-circle"></i> Vui lòng chọn Chủ đề để hiển thị câu hỏi...</div>';
                return;
            }

            questionContainer.innerHTML = '<div class="text-center py-3"><span class="spinner-border spinner-border-sm text-primary"></span> Đang tải ngân hàng câu hỏi...</div>';

            fetch(`/api/quiz-data/questions?topicId=${topicId}`)
                .then(res => res.json())
                .then(questions => {
                    questionContainer.innerHTML = ''; 

                    if (questions.length === 0) {
                        questionContainer.innerHTML = '<div class="text-danger fw-bold text-center py-3"><i class="bi bi-x-circle"></i> Chủ đề này hiện chưa có câu hỏi nào!</div>';
                        return;
                    }

                    questions.forEach(q => {
                        questionContainer.innerHTML += `
                            <div class="form-check border-bottom py-2">
                                <input class="form-check-input question-checkbox" type="checkbox" value="${q.questionId}">
                                <label class="form-check-label">
                                    <strong class="text-primary">Câu ${q.questionId}:</strong>
                                    <span>${q.content}</span>
                                </label>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    console.error("Lỗi:", err);
                    questionContainer.innerHTML = '<div class="text-danger fw-bold text-center py-3">Lỗi tải dữ liệu. Vui lòng tải lại trang.</div>';
                });
        });

        const btnSubmit = document.getElementById('btn-tao-de');

        if (btnSubmit) {
            btnSubmit.addEventListener('click', function (event) {
                event.preventDefault(); 

                try {
                    const csrfMeta = document.querySelector('meta[name="_csrf"]');
                    const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');

                    if (!csrfMeta || !csrfHeaderMeta) {
                        alert("Lỗi hệ thống: Không tìm thấy khóa bảo mật CSRF. Vui lòng tải lại trang.");
                        return;
                    }

                    const csrfToken = csrfMeta.content;
                    const csrfHeader = csrfHeaderMeta.content;

                    let subjectId = parseInt(document.getElementById('subjectId').value);
                    let topicId = parseInt(document.getElementById('topicId').value);
                    let title = document.getElementById('title').value;
                    let durationMinutes = parseInt(document.getElementById('durationMinutes').value);

                    let checkedBoxes = document.querySelectorAll('.question-checkbox:checked');
                    checkedBoxes.forEach(function (checkbox) {
                        questionIds.push(parseInt(checkbox.value));
                    });
                    if (!subjectId || isNaN(subjectId)) {
                        alert("Vui lòng chọn Môn học!");
                        return;
                    }
                    if (!topicId || isNaN(topicId)) {
                        alert("Vui lòng chọn Chủ đề cho đề thi!");
                        return;
                    }
                    if (!title || title.trim() === '') {
                        alert("Vui lòng nhập tiêu đề đề thi!");
                        return;
                    }
                    if (!durationMinutes || isNaN(durationMinutes) || durationMinutes <= 0) {
                        alert("Vui lòng nhập thời gian làm bài hợp lệ (lớn hơn 0)!");
                        return;
                    }
                    if (questionIds.length === 0) {
                        alert("Vui lòng chọn ít nhất 1 câu hỏi để tạo đề thi.");
                        return;
                    }

                    btnSubmit.disabled = true;
                    btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang tạo...';

                    fetch('/api/quizzes/manual', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            [csrfHeader]: csrfToken
                        },
                        body: JSON.stringify({
                            "subjectId": subjectId,
                            "topicId": topicId,
                            "title": title.trim(),
                            "durationMinutes": durationMinutes,
                            "questionIds": questionIds
                        })
                    })
                        .then(function (response) {
                            if (response.ok) {
                                alert("Tạo đề thi thành công!");
                                window.location.href = "/admin/quizzes";
                            } else if (response.status === 403) {
                                alert("Lỗi 403: Từ chối truy cập. Bạn không có quyền hoặc phiên đăng nhập đã hết hạn.");
                                btnSubmit.disabled = false;
                                btnSubmit.innerHTML = '<i class="bi bi-plus-circle me-1"></i> Tạo Đề Thi Ngay';
                            } else {
                                alert("Lỗi " + response.status + ": Đã xảy ra lỗi trên máy chủ.");
                                btnSubmit.disabled = false;
                                btnSubmit.innerHTML = '<i class="bi bi-plus-circle me-1"></i> Tạo Đề Thi Ngay';
                            }
                        })
                        .catch(function (error) {
                            console.error("Lỗi kết nối:", error);
                            alert("Lỗi kết nối mạng. Vui lòng thử lại sau.");
                            btnSubmit.disabled = false;
                            btnSubmit.innerHTML = '<i class="bi bi-plus-circle me-1"></i> Tạo Đề Thi Ngay';
                        });

                } catch (error) {
                    console.error("Lỗi thực thi Javascript:", error);
                    alert("Đã xảy ra lỗi không mong muốn. Vui lòng kiểm tra lại.");
                }
            });
        }
    </script>

</body>

</html>
