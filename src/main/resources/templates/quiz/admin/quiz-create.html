<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Tạo quiz', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">Tạo quiz thủ công</h3>
                    <p class="text-muted mb-0">Tạo đề thi mới từ ngân hàng câu hỏi theo môn học hoặc chủ đề.</p>
                </div>
                
                <a th:href="@{/admin/quizzes}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                </a>
            </div>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form id="manualQuizForm">
                        <div class="row g-4">
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Môn học</label>
                                <select id="subjectId" class="form-select" required>
                                    <option value="">-- Chọn môn học --</option>
                                    <option th:each="subject : ${subjects}"
                                            th:value="${subject.subjectId}"
                                            th:text="${subject.subjectName}">
                                        Subject
                                    </option>
                                </select>
                            </div>
                            
                            <div class="col-lg-6">
                                <label class="form-label fw-semibold">Chủ đề</label>
                                <select id="topicId" class="form-select">
                                    <option value="">-- Chọn chủ đề (không bắt buộc) --</option>
                                </select>
                            </div>
                            
                            <div class="col-lg-8">
                                <label class="form-label fw-semibold">Tiêu đề quiz</label>
                                <input type="text" id="title" class="form-control" placeholder="Nhập tên đề thi" required>
                            </div>
                            
                            <div class="col-lg-4">
                                <label class="form-label fw-semibold">Thời lượng (phút)</label>
                                <input type="number" id="durationMinutes" class="form-control" min="1" value="45" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label fw-semibold">Danh sách câu hỏi</label>
                                <div class="border rounded-4 p-3 bg-light-subtle" style="max-height: 420px; overflow-y: auto;">
                                    <div id="questionList" class="d-flex flex-column gap-2">
                                        <div class="text-muted">Chọn môn học/chủ đề để tải câu hỏi.</div>
                                    </div>
                                </div>
                                <div class="form-text">
                                    Chọn các câu hỏi sẽ xuất hiện trong đề.
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-plus-circle me-1"></i> Tạo quiz
                            </button>
                            <a th:href="@{/admin/quizzes}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                    
                    <div id="formMessage" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const subjectSelect = document.getElementById('subjectId');
        const topicSelect = document.getElementById('topicId');
        const questionList = document.getElementById('questionList');
        const form = document.getElementById('manualQuizForm');
        const messageBox = document.getElementById('formMessage');
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');

        async function loadTopics(subjectId) {
            topicSelect.innerHTML = '<option value="">-- Chọn chủ đề (không bắt buộc) --</option>';
            if (!subjectId) return;

            const response = await fetch(`/api/quiz-data/topics?subjectId=${subjectId}`);
            const topics = await response.json();

            topics.forEach(topic => {
                const option = document.createElement('option');
                option.value = topic.topicId;
                option.textContent = topic.topicName;
                topicSelect.appendChild(option);
            });
        }

        async function loadQuestions() {
            const topicId = topicSelect.value;

            if (!topicId) {
                questionList.innerHTML = '<div class="text-muted">Hãy chọn chủ đề để tải câu hỏi.</div>';
                return;
            }

            const response = await fetch(`/api/quiz-data/questions?topicId=${topicId}`);
            const questions = await response.json();

            if (!questions.length) {
                questionList.innerHTML = '<div class="text-muted">Không có câu hỏi nào trong chủ đề này.</div>';
                return;
            }

            questionList.innerHTML = '';
            questions.forEach(question => {
                const item = document.createElement('label');
                item.className = 'form-check border rounded-3 p-3 bg-white';
                item.innerHTML = `
                    <input class="form-check-input me-2" type="checkbox" value="${question.questionId}" name="questionIds">
                    <span class="form-check-label">${question.content}</span>
                `;
                questionList.appendChild(item);
            });
        }

        subjectSelect.addEventListener('change', async () => {
            await loadTopics(subjectSelect.value);
            questionList.innerHTML = '<div class="text-muted">Hãy chọn chủ đề để tải câu hỏi.</div>';
        });

        topicSelect.addEventListener('change', loadQuestions);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedQuestionIds = Array.from(document.querySelectorAll('input[name="questionIds"]:checked'))
                .map(input => Number(input.value));

            const payload = {
                subjectId: subjectSelect.value ? Number(subjectSelect.value) : null,
                topicId: topicSelect.value ? Number(topicSelect.value) : null,
                title: document.getElementById('title').value,
                durationMinutes: Number(document.getElementById('durationMinutes').value),
                questionIds: selectedQuestionIds
            };

            try {
                const response = await fetch('/api/quizzes/manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(csrfHeader && csrfToken ? {[csrfHeader]: csrfToken} : {})
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();

                if (!response.ok) {
                    messageBox.innerHTML = `<div class="alert alert-danger mb-0">${text}</div>`;
                    return;
                }

                messageBox.innerHTML = `<div class="alert alert-success mb-0">Tạo quiz thành công.</div>`;
                setTimeout(() => window.location.href = '/admin/quizzes', 800);
            } catch (error) {
                messageBox.innerHTML = `<div class="alert alert-danger mb-0">Không thể tạo quiz.</div>`;
            }
        });
    </script>
</div>
</body>
</html>
