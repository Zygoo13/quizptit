<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/admin-layout :: layout(pageTitle='Tạo Đề Thi', content=~{::content}, script=~{::script})}">
<head>
</head>

<body>

    <div th:fragment="content">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Tạo Đề Thi Mới</h6>
            </div>
            <div class="card-body">
                <form id="form-tao-de">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Chọn Môn Học:</label>
                        <select class="form-select" id="subjectId">
                            <option th:each="monHoc : ${subjects}" th:value="${monHoc.subjectId}"
                                th:text="${monHoc.subjectName}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề đề thi:</label>
                        <input type="text" class="form-control" id="title" placeholder="VD: Đề thi giữa kỳ môn Java"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Thời gian làm bài (Phút):</label>
                        <input type="number" class="form-control" id="durationMinutes" placeholder="VD: 45" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Tick chọn các câu hỏi đưa vào đề thi:</label>
                        <div class="border p-3 rounded"
                            style="max-height: 300px; overflow-y: auto; background-color: #f8f9fa;">
                            <div class="form-check border-bottom py-2" th:each="cauHoi : ${questions}">
                                <input class="form-check-input question-checkbox" type="checkbox"
                                    th:value="${cauHoi.questionId}">
                                <label class="form-check-label">
                                    <strong th:text="'Câu ' + ${cauHoi.questionId} + ':'">Câu 1:</strong>
                                    <span th:text="${cauHoi.content}">Nội dung câu hỏi...</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btn-tao-de" class="btn btn-success w-100 fw-bold">
                        Tạo Đề Thi Ngay
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script th:fragment="script">
        const btnSubmit = document.getElementById('btn-tao-de');

        if (btnSubmit) {
            btnSubmit.addEventListener('click', function (event) {
                event.preventDefault();

                try {
                    const csrfMeta = document.querySelector('meta[name="_csrf"]');
                    const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');

                    if (!csrfMeta || !csrfHeaderMeta) {
                        alert("Lỗi hệ thống: Không tìm thấy khóa bảo mật CSRF. Vui lòng tải lại trang.");
                        return;
                    }

                    const csrfToken = csrfMeta.content;
                    const csrfHeader = csrfHeaderMeta.content;

                    let subjectId = parseInt(document.getElementById('subjectId').value);
                    let title = document.getElementById('title').value;
                    let durationMinutes = parseInt(document.getElementById('durationMinutes').value);

                    let checkedBoxes = document.querySelectorAll('.question-checkbox:checked');
                    let questionIds = [];

                    checkedBoxes.forEach(function (checkbox) {
                        questionIds.push(parseInt(checkbox.value));
                    });

                    if (questionIds.length === 0) {
                        alert("Vui lòng chọn ít nhất 1 câu hỏi để tạo đề thi.");
                        return;
                    }

                    fetch('/api/quizzes/manual', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            [csrfHeader]: csrfToken
                        },
                        body: JSON.stringify({
                            "subjectId": subjectId,
                            "title": title,
                            "durationMinutes": durationMinutes,
                            "questionIds": questionIds
                        })
                    })
                        .then(function (response) {
                            if (response.ok) {
                                alert("Tạo đề thi thành công!");
                                window.location.href = "/admin/quizzes";
                            } else if (response.status === 403) {
                                alert("Lỗi 403: Từ chối truy cập. Vui lòng kiểm tra lại quyền hoặc phiên đăng nhập.");
                            } else if (response.status === 404) {
                                alert("Lỗi 404: Không tìm thấy điểm cuối API.");
                            } else {
                                alert("Lỗi " + response.status + ": Đã có lỗi xảy ra trong quá trình xử lý.");
                            }
                        })
                        .catch(function (error) {
                            console.error("Lỗi kết nối:", error);
                            alert("Lỗi kết nối mạng. Vui lòng thử lại sau.");
                        });

                } catch (error) {
                    console.error("Lỗi thực thi Javascript:", error);
                    alert("Đã xảy ra lỗi không mong muốn. Vui lòng kiểm tra lại.");
                }
            });
        }
    </script>

</body>

</html>
