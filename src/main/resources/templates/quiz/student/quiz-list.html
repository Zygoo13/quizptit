<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/student-layout :: layout(pageTitle='Bài Luyện Tập', content=~{::content})}">

<head>
</head>

<body>

    <div th:fragment="content" class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-primary">
                <i class="bi bi-controller me-2"></i>Danh sách Bài Luyện Tập
            </h3>

            <div>
                <select class="form-select border-primary shadow-sm"
                    onchange="window.location.href='/quizzes?subjectId=' + this.value">
                    <option value="">-- Tất cả môn học --</option>
                </select>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(quizzes)}" class="alert alert-warning text-center shadow-sm py-4">
            <i class="bi bi-emoji-frown fs-1 d-block mb-2"></i>
            <h5>Hiện tại chưa có đề thi nào được mở.</h5>
            <p class="mb-0 text-muted">Vui lòng quay lại sau nhé!</p>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${not #lists.isEmpty(quizzes)}">

            <div class="col" th:each="quiz : ${quizzes}">
                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden quiz-card-hover">

                    <div class="bg-primary bg-gradient p-3 text-white text-center">
                        <i class="bi bi-journal-bookmark-fill fs-1"></i>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-dark mb-3" th:text="${quiz.title}">Đề thi môn Java</h5>

                        <div class="d-flex justify-content-between text-muted mb-2 small">
                            <span><i class="bi bi-tag-fill text-info me-1"></i>
                                <span th:text="${quiz.subject != null ? quiz.subject.subjectName : 'Tổng hợp'}">Tên
                                    môn</span>
                            </span>
                        </div>

                        <div class="d-flex justify-content-between text-muted mb-3 small border-top pt-3 mt-auto">
                            <span><i class="bi bi-clock-history text-warning me-1"></i> <span
                                    th:text="${quiz.durationMinutes}">45</span> phút</span>
                            <span><i class="bi bi-question-circle-fill text-success me-1"></i> <span
                                    th:text="${quiz.totalQuestions}">50</span> câu</span>
                        </div>

                        <a th:href="@{/quizzes/{id}(id=${quiz.quizId})}"
                            class="btn btn-outline-primary w-100 fw-bold rounded-pill mt-2">
                            Vào Thi Ngay <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <style th:fragment="style">
        .quiz-card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .quiz-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }
    </style>

</body>

</html>
