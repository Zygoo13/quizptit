<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/student-layout :: layout(pageTitle='Lịch Sử Làm Bài', content=~{::content}, script=~{::script})}">

<head></head>

<body>

    <div th:fragment="content" class="container mt-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h3 class="fw-bold text-primary mb-0">
                <i class="bi bi-clock-history me-2"></i>Lịch Sử Làm Bài Của Tôi
            </h3>
            <span class="badge bg-primary rounded-pill px-3 py-2 lh-base" id="total-attempts-badge">Đang tải...</span>
        </div>

        <div id="loading-spinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-3">Đang tải dữ liệu lịch sử...</p>
        </div>

        <div id="empty-state" class="alert alert-info text-center shadow-sm py-5 d-none">
            <i class="bi bi-journal-x fs-1 d-block mb-3 text-secondary"></i>
            <h5 class="fw-bold">Bạn chưa hoàn thành bài thi nào</h5>
            <p class="mb-3 text-muted">Hãy tham gia các bài luyện tập hoặc kỳ thi để ghi nhận kết quả nhé!</p>
            <a th:href="@{/quizzes}" class="btn btn-primary rounded-pill fw-bold">Khám phá đề thi ngay</a>
        </div>

        <div id="history-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 d-none">
            <!-- Dữ liệu sẽ được render bằng JS vào đây -->
        </div>

    </div>

    <script th:fragment="script">
        document.addEventListener('DOMContentLoaded', function() {
            loadHistory();
        });

        function formatDateTime(isoString) {
            if (!isoString) return "Không xác định";
            const date = new Date(isoString);
            return date.toLocaleDateString('vi-VN') + ' ' + date.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
        }

        function formatDuration(seconds) {
            if (!seconds) return "0 phút";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m} phút ${s} giây`;
        }

        function loadHistory() {
            fetch('/api/attempts/history')
                .then(res => res.json())
                .then(historyList => {
                    document.getElementById('loading-spinner').classList.add('d-none');
                    document.getElementById('total-attempts-badge').textContent = historyList.length + ' bài đã làm';

                    if (historyList.length === 0) {
                        document.getElementById('empty-state').classList.remove('d-none');
                        return;
                    }

                    const container = document.getElementById('history-container');
                    let html = '';

                    historyList.forEach(attempt => {
                        const isCompleted = attempt.status === 'SUBMITTED' || attempt.status === 'GRADED';
                        
                        // Màu sắc và Icon tương ứng với cấu hình
                        const bgClass = isCompleted ? 'bg-success' : 'bg-warning text-dark';
                        const iconClass = isCompleted ? 'bi-check-circle-fill text-success' : 'bi-hourglass-split text-warning';
                        const statusText = isCompleted ? 'Đã Nộp' : 'Đang Làm';

                        html += `
                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden history-card">
                                    <div class="${bgClass} py-1 text-center text-white fw-bold" style="font-size: 0.85rem; letter-spacing: 1px;">
                                        ${statusText.toUpperCase()}
                                    </div>
                                    <div class="card-body d-flex flex-column p-4">
                                        <h5 class="card-title fw-bold text-dark mb-3 line-clamp-2" title="${attempt.quizTitle}">
                                            ${attempt.quizTitle}
                                        </h5>
                                        
                                        <div class="text-muted small mb-2">
                                            <i class="bi bi-calendar-event text-secondary me-2"></i>
                                            Bắt đầu: <span class="fw-medium">${formatDateTime(attempt.startedAt)}</span>
                                        </div>
                                        
                                        ${isCompleted ? `
                                            <div class="text-muted small mb-2">
                                                <i class="bi bi-calendar-check text-success me-2"></i>
                                                Nộp lúc: <span class="fw-medium">${formatDateTime(attempt.submittedAt)}</span>
                                            </div>
                                            <div class="text-muted small mb-3 border-bottom pb-3">
                                                <i class="bi bi-stopwatch text-danger me-2"></i>
                                                Thời gian: <span class="fw-medium">${formatDuration(attempt.durationSeconds)}</span>
                                            </div>
                                            <div class="d-flex justify-content-between align-items-end mt-auto pt-2">
                                                <div>
                                                    <p class="text-muted mb-0 small">Điểm số</p>
                                                    <h3 class="fw-bold text-primary mb-0">${attempt.totalScore !== null ? attempt.totalScore : '0'}</h3>
                                                </div>
                                                <div class="text-end">
                                                    <p class="text-muted mb-0 small">Đúng</p>
                                                    <h5 class="fw-bold text-success mb-0">${attempt.correctCount !== null ? attempt.correctCount : 0} câu</h5>
                                                </div>
                                            </div>
                                        ` : `
                                            <div class="text-muted small mb-3 border-bottom pb-3 mt-auto pt-4">
                                                <i class="bi bi-info-circle text-info me-2"></i>
                                                Bạn chưa nộp bài thi này!
                                            </div>
                                        `}
                                    </div>
                                    <div class="card-footer bg-white border-0 p-3 pt-0">
                                        ${isCompleted ? `
                                            <a href="/quizzes/attempts/${attempt.attemptId}/result" class="btn btn-outline-primary w-100 fw-bold rounded-pill">
                                                Xem Kết Quả <i class="bi bi-arrow-right ms-1"></i>
                                            </a>
                                        ` : `
                                            <a href="/quizzes/attempts/${attempt.attemptId}/take" class="btn btn-warning w-100 fw-bold rounded-pill text-dark shadow-sm">
                                                Tiếp Tục Làm Bài <i class="bi bi-play-fill ms-1"></i>
                                            </a>
                                        `}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                    container.classList.remove('d-none');
                })
                .catch(err => {
                    console.error("Lỗi khi tải lịch sử:", err);
                    document.getElementById('loading-spinner').innerHTML = `<p class="text-danger"><i class="bi bi-exclamation-triangle"></i> Có lỗi xảy ra khi tải dữ liệu. Vui lòng tải lại trang.</p>`;
                });
        }
    </script>

    <style th:fragment="style">
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            height: 2.8rem;
        }
        .history-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .history-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
        }
    </style>

</body>
</html>
