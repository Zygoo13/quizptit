<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/student-layout :: layout('Xem lại bài làm', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .option-review {
            border: 1px solid #e9ecef;
            border-radius: 14px;
            padding: 14px 16px;
        }

        .option-review.correct {
            border-color: #198754;
            background: #edf9f1;
        }

        .option-review.selected-wrong {
            border-color: #dc3545;
            background: #fff1f2;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Xem lại bài làm</h3>
            <p class="text-muted mb-0" th:text="${attempt.quiz.title}">Quiz title</p>
        </div>
        
        <a th:href="@{/quizzes/attempts/{attemptId}/result(attemptId=${attempt.attemptId})}"
           class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-1"></i> Quay lại kết quả
        </a>
    </div>
    
    <div class="d-flex flex-column gap-4">
        <div th:each="attemptQuestion, stat : ${attempt.attemptQuestions}"
             class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                    <div>
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3 py-2 mb-2"
                              th:text="'Câu ' + ${stat.index + 1}">
                            Câu 1
                        </span>
                        <h5 class="fw-bold mb-0"
                            th:text="${attemptQuestion.question.content}">
                            Nội dung câu hỏi
                        </h5>
                    </div>
                    
                    <th:block th:with="answer=${answerMap != null ? answerMap.get(attemptQuestion.attemptQuestionId) : null}">
                        <span th:if="${answer != null and answer.isCorrect != null and answer.isCorrect}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            Đúng
                        </span>
                        <span th:if="${answer == null or answer.isCorrect == null or !answer.isCorrect}"
                              class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3 py-2">
                            Sai / Chưa chọn
                        </span>
                    </th:block>
                </div>
                
                <div class="d-flex flex-column gap-3 mt-4"
                     th:with="selectedAnswer=${answerMap != null ? answerMap.get(attemptQuestion.attemptQuestionId) : null}">
                    <div th:each="option : ${attemptQuestion.question.options}"
                         class="option-review"
                         th:class="${'option-review'
                            + (option.isCorrect ? ' correct' : '')
                            + (selectedAnswer != null
                               and selectedAnswer.selectedOption != null
                               and selectedAnswer.selectedOption.optionId != null
                               and selectedAnswer.selectedOption.optionId == option.optionId
                               and !option.isCorrect ? ' selected-wrong' : '')}">
                        <div class="d-flex justify-content-between align-items-start gap-3">
                            <div>
                                <div class="fw-semibold mb-1"
                                     th:text="${option.optionLabel} + '.'">
                                    A.
                                </div>
                                <div th:text="${option.content}">Nội dung đáp án</div>
                            </div>
                            
                            <div class="text-nowrap">
                                <span th:if="${option.isCorrect}"
                                      class="badge bg-success rounded-pill px-3 py-2">
                                    Đáp án đúng
                                </span>
                                
                                <span th:if="${selectedAnswer != null
                                              and selectedAnswer.selectedOption != null
                                              and selectedAnswer.selectedOption.optionId != null
                                              and selectedAnswer.selectedOption.optionId == option.optionId
                                              and !option.isCorrect}"
                                      class="badge bg-danger rounded-pill px-3 py-2">
                                    Bạn đã chọn
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4"
                     th:if="${attemptQuestion.question.explanation != null and !#strings.isEmpty(attemptQuestion.question.explanation)}">
                    <div class="alert alert-light border rounded-4 mb-0">
                        <div class="fw-semibold mb-1">
                            <i class="bi bi-info-circle me-1"></i> Giải thích
                        </div>
                        <div th:text="${attemptQuestion.question.explanation}">Giải thích đáp án</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
