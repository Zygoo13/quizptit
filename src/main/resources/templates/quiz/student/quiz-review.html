<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/student-layout :: layout(pageTitle='Chi Tiết Bài Làm', content=~{::content}, script=~{::script})}">

<head></head>

<body>

    <div th:fragment="content" class="container mt-4 mb-5">
        
        <div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom">
            <h3 class="fw-bold text-primary mb-0">
                <i class="bi bi-card-checklist me-2"></i> Xem Lại Đáp Án
            </h3>
            <a th:href="@{/quizzes/attempts/{id}/result(id=${attempt.attemptId})}" class="btn btn-outline-secondary fw-bold rounded-pill">
                <i class="bi bi-arrow-left me-1"></i> Trở Về Kết Quả
            </a>
        </div>

        <!-- Summary box -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm border-0 border-start border-primary border-4 rounded-3 bg-light">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="fw-bold text-dark mb-1" th:text="${attempt.quiz.title}">Đề thi</h5>
                            <p class="text-muted mb-0 small">
                                Nộp lúc: <span class="fw-medium" th:text="${#temporals.format(attempt.submittedAt, 'dd/MM/yyyy HH:mm')}">Time</span>
                            </p>
                        </div>
                        <div class="text-end">
                            <h4 class="fw-bold text-success mb-1" th:text="${attempt.totalScore} + ' Điểm'">10 Điểm</h4>
                            <span class="badge bg-primary px-3 py-2 rounded-pill shadow-sm" th:text="'Đúng ' + ${attempt.correctCount} + ' / ' + ${attempt.quiz.totalQuestions}">Đúng 10/10</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <!-- Vòng lặp từng câu hỏi đã làm -->
                <div class="card shadow-sm border-0 mb-4 review-card" 
                     th:each="aq, stt : ${attempt.attemptQuestions}"
                     th:with="userAnswer=${answerMap.get(aq.attemptQuestionId)}">
                     
                    <!-- Xác định trạng thái của câu hỏi này -->
                    <div th:with="isCorrectAnswer=${userAnswer != null and userAnswer.isCorrect}"
                         th:classappend="${isCorrectAnswer} ? 'border-success' : 'border-danger'"
                         class="card-body position-relative p-4 border-start border-4">
                         
                        <!-- Huy hiệu Tình trạng câu (Đúng/Sai/Bỏ qua) -->
                        <div class="position-absolute top-0 end-0 mt-3 me-3">
                            <span th:if="${userAnswer != null and userAnswer.isCorrect}" class="badge bg-success bg-opacity-10 text-success border border-success fw-bold px-3 py-2 rounded-pill">
                                <i class="bi bi-check-lg me-1"></i> Đúng
                            </span>
                            <span th:if="${userAnswer != null and !userAnswer.isCorrect and userAnswer.selectedOption != null}" class="badge bg-danger bg-opacity-10 text-danger border border-danger fw-bold px-3 py-2 rounded-pill">
                                <i class="bi bi-x-lg me-1"></i> Sai
                            </span>
                            <span th:if="${userAnswer == null or userAnswer.selectedOption == null}" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary fw-bold px-3 py-2 rounded-pill">
                                <i class="bi bi-dash-lg me-1"></i> Bỏ Trống
                            </span>
                        </div>

                        <h6 class="fw-bold text-primary mb-4 pb-2 border-bottom w-75">
                            <span class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center me-2 shadow-sm" style="width: 28px; height: 28px; font-size: 0.85rem;" th:text="${stt.count}">1</span>
                            <span class="text-dark" th:text="${aq.question.content}">Nội dung câu hỏi</span>
                        </h6>

                        <div class="options-container ps-2 pe-md-5">
                            <!-- Vòng lặp từng đáp án của câu hỏi -->
                            <div th:each="opt : ${aq.question.options}">
                                
                                <!-- TÍNH TOÁN CLASS SẮC MÀU CHO ĐÁP ÁN: 
                                     1. Nếu đúng: Xanh lá
                                     2. Nếu người dùng chọn sai: Đỏ
                                     3. Nếu người dùng ko chọn, và câu sai: Xám nhạt
                                 -->
                                <div th:with="isSelected=${userAnswer != null and userAnswer.selectedOption != null and userAnswer.selectedOption.optionId == opt.optionId},
                                              isRight=${opt.isCorrect}"
                                     th:classappend="${isRight} ? 'bg-success bg-opacity-10 border-success text-success shadow-sm' : 
                                                    (${isSelected} ? 'bg-danger bg-opacity-10 border-danger text-danger shadow-sm' : 'bg-light border-light text-secondary')"
                                     class="border rounded p-3 mb-3 d-flex justify-content-between align-items-center transition-all">
                                     
                                    <div class="d-flex align-items-center w-100">
                                        <!-- Radio button giả lập để giống giao diện thi -->
                                        <div class="form-check m-0 d-flex align-items-center w-100">
                                            <input class="form-check-input me-3" type="radio" disabled 
                                                   th:checked="${isSelected}" 
                                                   style="opacity: 1;"
                                                   th:classappend="${isRight} ? 'border-success bg-success' : (${isSelected} ? 'border-danger bg-danger' : '')">
                                            <label class="form-check-label w-100 fw-medium" th:text="${opt.content}" style="opacity: 1;">
                                                Đáp án A
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <!-- Icon trạng thái bên phải của đáp án -->
                                    <div style="width: 30px; text-align: right;">
                                        <i th:if="${isRight}" class="bi bi-check-circle-fill text-success fs-5 animate__animated animate__zoomIn"></i>
                                        <i th:if="${!isRight and isSelected}" class="bi bi-x-circle-fill text-danger fs-5 animate__animated animate__zoomIn"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Lời giải thích -->
                        <div th:if="${aq.question.explanation != null and !aq.question.explanation.isEmpty()}" class="alert alert-info mt-4 mb-0 border-0 shadow-sm rounded-3">
                            <strong class="d-block mb-1 text-info-emphasis"><i class="bi bi-lightbulb-fill text-warning me-2"></i>Giải thích chuyên môn:</strong>
                            <span class="text-dark" th:text="${aq.question.explanation}">Nội dung giải thích...</span>
                        </div>
                        
                    </div>
                </div>
                
            </div>
        </div>

    </div>

    <script th:fragment="script">
        // Bạn có thể thêm JS vào đây nếu muốn, ví dụ: Scroll up.
    </script>

</body>

</html>
