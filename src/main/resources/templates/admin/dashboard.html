<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Bảng điều khiển', ~{::content})}">
<head></head>
<body>
<div th:fragment="content">
    <!-- Stats Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h6 class="text-muted small text-uppercase fw-bold">Tổng người dùng</h6>
                <h2 class="fw-bold text-primary">1,240</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h6 class="text-muted small text-uppercase fw-bold">Bài thi đang mở</h6>
                <h2 class="fw-bold text-success">15</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h6 class="text-muted small text-uppercase fw-bold">Câu hỏi hệ thống</h6>
                <h2 class="fw-bold text-warning">4,500</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-center">
                <h6 class="text-muted small text-uppercase fw-bold">Lượt làm bài hôm nay</h6>
                <h2 class="fw-bold text-danger">328</h2>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="fw-bold mb-4 border-bottom pb-2">Hoạt động mới nhất</h5>
                <div class="text-center py-5">
                    <i class="bi bi-activity text-muted opacity-25" style="font-size: 3rem;"></i>
                    <p class="text-muted mt-2">Dữ liệu biểu đồ hoạt động sẽ hiển thị tại đây.</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4 h-100">
                <h5 class="fw-bold mb-4 border-bottom pb-2">Module QL</h5>
                <div class="d-grid gap-2">
                    <a th:href="@{/admin/users}" class="btn btn-light text-start"><i class="bi bi-people me-2"></i> QL Người dùng</a>
                    <a th:href="@{/admin/subjects}" class="btn btn-light text-start"><i class="bi bi-book me-2"></i> QL Môn học</a>
                    <a th:href="@{/admin/quizzes}" class="btn btn-light text-start"><i class="bi bi-pencil-square me-2"></i> QL Kỳ thi</a>
                    <a th:href="@{/admin/community/questions}" class="btn btn-light text-start"><i class="bi bi-shield-check me-2"></i> Kiểm duyệt</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
