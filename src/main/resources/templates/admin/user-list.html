<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-layout :: layout('Quản lý người dùng', ~{::content}, ~{})}">
<head></head>
<body>
<div th:fragment="content">
    <style>
        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }
    </style>
    
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý người dùng</h3>
            <p class="text-muted mb-0">
                Tìm kiếm, lọc trạng thái và truy cập chi tiết từng tài khoản.
            </p>
        </div>
        
        <span class="badge bg-light text-dark border px-3 py-2">
            Admin:
            <strong th:text="${currentUserEmail != null ? currentUserEmail : 'admin@quizptit.local'}">admin@quizptit.local</strong>
        </span>
    </div>
    
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form th:action="@{/admin/users}" th:object="${filterForm}" method="get" class="row g-3 align-items-end">
                <div class="col-lg-6">
                    <label class="form-label fw-semibold">Từ khóa</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text"
                               class="form-control"
                               th:field="*{keyword}"
                               placeholder="Tìm theo email hoặc tên người dùng">
                    </div>
                </div>
                
                <div class="col-lg-3">
                    <label class="form-label fw-semibold">Trạng thái</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="">Tất cả trạng thái</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}">
                            ACTIVE
                        </option>
                    </select>
                </div>
                
                <div class="col-lg-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-funnel me-1"></i> Lọc
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary flex-fill">Làm mới</a>
                </div>
            </form>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Người dùng</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            Không tìm thấy người dùng nào phù hợp.
                        </td>
                    </tr>
                    
                    <tr th:each="user : ${users}">
                        <td class="ps-4 fw-bold text-primary" th:text="${user.userId}">1</td>
                        
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="user-avatar"
                                     th:text="${user.fullName != null and !#strings.isEmpty(user.fullName)} ? ${#strings.substring(user.fullName,0,1)} : 'U'">
                                    U
                                </div>
                                
                                <div>
                                    <div class="fw-semibold" th:text="${user.fullName}">Full Name</div>
                                    <div class="small text-muted" th:text="${user.avatarUrl != null and !#strings.isEmpty(user.avatarUrl)} ? 'Có avatar' : 'Chưa có avatar'">
                                        Chưa có avatar
                                    </div>
                                </div>
                            </div>
                        </td>
                        
                        <td th:text="${user.email}">email@example.com</td>
                        
                        <td>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2"
                              th:text="${user.role.roleName}">
                            STUDENT
                        </span>
                        </td>
                        
                        <td>
                        <span th:if="${user.status.name() == 'ACTIVE'}"
                              class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-check-circle-fill me-1"></i> ACTIVE
                        </span>
                            
                            <span th:if="${user.status.name() == 'INACTIVE'}"
                                  class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-pause-circle-fill me-1"></i> INACTIVE
                        </span>
                            
                            <span th:if="${user.status.name() == 'BANNED'}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3 py-2">
                            <i class="bi bi-slash-circle-fill me-1"></i> BANNED
                        </span>
                        </td>
                        
                        <td class="text-end pe-4">
                            <a th:href="@{/admin/users/{id}(id=${user.userId})}"
                               class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                <i class="bi bi-eye me-1"></i> Xem chi tiết
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
